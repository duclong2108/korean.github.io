<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPIK I — Ngữ Pháp Toàn Tập</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e2a;
    --border: #252a38;
    --gold: #c9a84c;
    --gold-dim: #7a6230;
    --blue: #4a80c4;
    --blue-dim: #1e3a5f;
    --green: #4caf7d;
    --red: #e05c5c;
    --purple: #9b7fd4;
    --text: #e8e6e0;
    --text2: #9a97a0;
    --text3: #5a5760;
    --tag-bg: #1e2535;
    --card-shadow: 0 2px 24px rgba(0,0,0,0.5);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #131825 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .logo-kr {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stats {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    gap: 16px;
  }
  .stats span { display: flex; align-items: center; gap: 4px; }
  .stats strong { color: var(--gold); }

  /* SEARCH */
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px 8px 36px;
    width: 240px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--gold-dim); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
  }

  /* LAYOUT */
  .layout {
    display: flex;
    min-height: calc(100vh - 65px);
  }

  /* SIDEBAR */
  aside {
    width: 220px;
    min-width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: sticky;
    top: 65px;
    height: calc(100vh - 65px);
    overflow-y: auto;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section {
    padding: 6px 14px 2px;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 8px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 8px 16px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: inherit;
    font-size: 12.5px;
    text-align: left;
    cursor: pointer;
    transition: all .15s;
    border-left: 2px solid transparent;
  }
  .cat-btn:hover { background: var(--bg3); color: var(--text); }
  .cat-btn.active {
    background: var(--bg3);
    color: var(--gold);
    border-left-color: var(--gold);
    font-weight: 600;
  }
  .cat-btn .cnt {
    margin-left: auto;
    font-size: 10px;
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 10px;
    color: var(--text3);
  }
  .cat-btn.active .cnt { color: var(--gold-dim); }
  .cat-emoji { width: 18px; text-align: center; }

  /* MAIN CONTENT */
  main {
    flex: 1;
    padding: 24px;
    max-width: 900px;
    overflow-y: auto;
  }

  /* CATEGORY HEADER */
  .cat-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .cat-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
  }
  .cat-count {
    font-size: 11px;
    color: var(--text3);
    background: var(--bg2);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  /* GRAMMAR CARD */
  .grammar-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    transition: border-color .2s;
  }
  .grammar-card:hover { border-color: #2e3448; }

  .card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--bg2);
  }
  .card-head:hover { background: var(--bg3); }

  .pattern-tag {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--gold);
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    padding: 4px 12px;
    border-radius: 6px;
    white-space: nowrap;
  }

  .card-meta {
    flex: 1;
    min-width: 0;
  }
  .card-meaning {
    font-weight: 600;
    font-size: 13.5px;
    color: var(--text);
  }
  .card-level {
    font-size: 10.5px;
    color: var(--text3);
    margin-top: 1px;
  }

  .level-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .lv1 { background: rgba(74,128,196,0.2); color: var(--blue); border: 1px solid rgba(74,128,196,0.3); }
  .lv2 { background: rgba(155,127,212,0.2); color: var(--purple); border: 1px solid rgba(155,127,212,0.3); }

  .chevron {
    color: var(--text3);
    font-size: 12px;
    transition: transform .25s;
    flex-shrink: 0;
  }
  .grammar-card.open .chevron { transform: rotate(180deg); }

  /* CARD BODY */
  .card-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
  }
  .grammar-card.open .card-body { display: block; }

  /* SECTIONS */
  .section {
    margin-top: 14px;
  }
  .section-label {
    font-size: 9.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* STRUCTURE BOX */
  .structure-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .structure-note {
    font-size: 11.5px;
    color: var(--text2);
    margin-top: 5px;
  }

  /* CONJUGATION TABLE */
  .conj-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    margin-top: 6px;
  }
  .conj-table th {
    background: var(--bg3);
    color: var(--text3);
    font-weight: 500;
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  .conj-table td {
    padding: 7px 10px;
    border-bottom: 1px solid rgba(37,42,56,0.5);
    color: var(--text2);
  }
  .conj-table tr:last-child td { border-bottom: none; }
  .conj-table td:first-child { color: var(--text); font-weight: 500; }
  .kr { font-family: 'Noto Serif KR', serif; color: var(--text); }
  .kr-gold { font-family: 'Noto Serif KR', serif; color: var(--gold); }

  /* USAGE LIST */
  .usage-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .usage-list li {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    font-size: 13px;
    color: var(--text2);
  }
  .usage-list li::before {
    content: '▸';
    color: var(--blue);
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* EXAMPLES */
  .example-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .example-item {
    background: var(--bg3);
    border-radius: 8px;
    padding: 10px 14px;
    border-left: 2px solid var(--blue-dim);
  }
  .example-kr {
    font-family: 'Noto Serif KR', serif;
    font-size: 14.5px;
    color: var(--text);
    margin-bottom: 3px;
  }
  .highlight {
    color: var(--gold);
    font-weight: 700;
  }
  .example-rom {
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
    margin-bottom: 3px;
  }
  .example-vi {
    font-size: 12.5px;
    color: var(--blue);
  }

  /* NOTES */
  .note-box {
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .note-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .note-content { font-size: 12.5px; color: var(--text2); }

  /* COMPARE BOX */
  .compare-box {
    background: rgba(224,92,92,0.05);
    border: 1px solid rgba(224,92,92,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--text2);
  }
  .compare-box strong { color: var(--red); }

  /* TAGS */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--text3);
    border: 1px solid var(--border);
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; margin-bottom: 4px; color: var(--text2); }

  /* SCROLLBAR */
  main::-webkit-scrollbar { width: 5px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* SEARCH HIGHLIGHT */
  .search-match { background: rgba(201,168,76,0.25); border-radius: 2px; color: var(--gold); }

  @media (max-width: 700px) {
    aside { display: none; }
    main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-kr">한국어 문법</span>
    <span class="logo-sub">TOPIK I — Ngữ Pháp Toàn Tập</span>
  </div>
  <div class="header-right">
    <div class="stats">
      <span>📚 <strong id="total-grammar">0</strong> ngữ pháp</span>
      <span>📁 <strong id="total-cats">0</strong> chủ đề</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Tìm ngữ pháp…" autocomplete="off">
    </div>
  </div>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

// ====================== APP LOGIC ======================

const cats = [...new Set(GRAMMAR_DATA.map(g => g.cat))];
const catIcons = {};
GRAMMAR_DATA.forEach(g => catIcons[g.cat] = g.catIcon);

let currentCat = cats[0];
let searchQuery = '';

document.getElementById('total-grammar').textContent = GRAMMAR_DATA.length;
document.getElementById('total-cats').textContent = cats.length;

function buildSidebar() {
  const aside = document.getElementById('sidebar');
  let html = '<div class="sidebar-section">Chủ đề</div>';
  cats.forEach(cat => {
    const count = GRAMMAR_DATA.filter(g => g.cat === cat).length;
    const isActive = cat === currentCat;
    html += `<button class="cat-btn${isActive ? ' active' : ''}" data-cat="${cat}">
      <span class="cat-emoji">${catIcons[cat]}</span>
      <span>${cat.split(' (')[0]}</span>
      <span class="cnt">${count}</span>
    </button>`;
  });
  aside.innerHTML = html;
  aside.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      searchQuery = '';
      document.getElementById('search').value = '';
      buildSidebar();
      buildMain();
    });
  });
}

function hl(text) {
  if (!searchQuery) return text;
  const re = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<span class="search-match">$1</span>');
}

function renderCard(g) {
  const lvClass = g.level === 1 ? 'lv1' : 'lv2';
  const lvText = `TOPIK 1 - LV${g.level}`;

  let conjHtml = '';
  if (g.conj && g.conj.length) {
    conjHtml = `<div class="section">
      <div class="section-label">Chia / Biến đổi</div>
      <table class="conj-table">
        <thead><tr><th>Dạng</th><th>Kết quả</th><th>Ví dụ</th></tr></thead>
        <tbody>
          ${g.conj.map(([a,b,c]) => `<tr><td>${hl(a)}</td><td class="kr-gold">${hl(b)}</td><td class="kr" style="color:var(--text2);font-size:11.5px">${hl(c||'')}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  let structureHtml = '';
  if (g.structure) {
    structureHtml = `<div class="section">
      <div class="section-label">Cấu trúc</div>
      <div class="structure-box">${hl(g.structure)}</div>
      ${g.structureNote ? `<div class="structure-note">→ ${hl(g.structureNote)}</div>` : ''}
    </div>`;
  }

  let usageHtml = '';
  if (g.usage && g.usage.length) {
    usageHtml = `<div class="section">
      <div class="section-label">Cách dùng</div>
      <ul class="usage-list">${g.usage.map(u => `<li>${hl(u)}</li>`).join('')}</ul>
    </div>`;
  }

  let exHtml = '';
  if (g.examples && g.examples.length) {
    exHtml = `<div class="section">
      <div class="section-label">Ví dụ</div>
      <div class="example-list">
        ${g.examples.map(e => `
          <div class="example-item">
            <div class="example-kr">${e.kr}</div>
            <div class="example-rom">${hl(e.rom)}</div>
            <div class="example-vi">→ ${hl(e.vi)}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  let notesHtml = '';
  if (g.notes) {
    notesHtml = `<div class="section">
      <div class="note-box">
        <span class="note-icon">💡</span>
        <div class="note-content">${hl(g.notes)}</div>
      </div>
    </div>`;
  }

  let compareHtml = '';
  if (g.compare) {
    compareHtml = `<div class="section">
      <div class="section-label">So sánh</div>
      <div class="compare-box">${hl(g.compare)}</div>
    </div>`;
  }

  let tagsHtml = '';
  if (g.tags) {
    tagsHtml = `<div class="tags">${g.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
  }

  return `<div class="grammar-card" id="card-${g.id}">
    <div class="card-head" onclick="toggleCard('${g.id}')">
      <div class="pattern-tag">${g.pattern}</div>
      <div class="card-meta">
        <div class="card-meaning">${hl(g.meaning)}</div>
        <div class="card-level"><span class="level-badge ${lvClass}">${lvText}</span></div>
      </div>
      <div class="chevron">▼</div>
    </div>
    <div class="card-body">
      ${structureHtml}
      ${conjHtml}
      ${usageHtml}
      ${exHtml}
      ${compareHtml}
      ${notesHtml}
      ${tagsHtml}
    </div>
  </div>`;
}

function buildMain() {
  const main = document.getElementById('main');
  let items;

  if (searchQuery.length >= 2) {
    const q = searchQuery.toLowerCase();
    items = GRAMMAR_DATA.filter(g =>
      g.pattern.toLowerCase().includes(q) ||
      g.meaning.toLowerCase().includes(q) ||
      (g.usage||[]).some(u => u.toLowerCase().includes(q)) ||
      (g.notes||'').toLowerCase().includes(q) ||
      (g.compare||'').toLowerCase().includes(q) ||
      (g.examples||[]).some(e => e.vi.toLowerCase().includes(q) || e.kr.toLowerCase().includes(q))
    );
    const count = items.length;
    main.innerHTML = `
      <div class="cat-header">
        <div class="cat-title">🔍 Kết quả tìm kiếm</div>
        <span class="cat-count">${count} ngữ pháp</span>
      </div>
      ${count === 0 ? `<div class="empty"><div class="empty-icon">🔍</div><h3>Không tìm thấy</h3><p style="color:var(--text3);font-size:13px">Thử từ khóa khác nhé bro</p></div>` : items.map(renderCard).join('')}
    `;
  } else {
    items = GRAMMAR_DATA.filter(g => g.cat === currentCat);
    const catName = currentCat;
    main.innerHTML = `
      <div class="cat-header">
        <div class="cat-title">${catIcons[catName]} ${catName.split(' (')[0]}</div>
        <span class="cat-count">${items.length} ngữ pháp</span>
      </div>
      ${items.map(renderCard).join('')}
    `;
  }
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open');
}

// SEARCH
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    buildSidebar();
    buildMain();
  }, 250);
});

// INIT
buildSidebar();
buildMain();
</script>
