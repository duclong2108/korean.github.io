<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPIK II 한자어 사전 | Từ vựng Hán Hàn</title>
    <meta name="description" content="Bảng sơ đồ từ vựng Hán Hàn cho kỳ thi TOPIK II">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <header>
        <div class="header-content">
            <h1>한자어 <span class="accent">사전</span></h1>
            <p class="subtitle">Sơ đồ từ vựng Hán Hàn — TOPIK II</p>
        </div>
        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchInput" placeholder="Tìm kiếm 한자 hoặc từ vựng..." autocomplete="off">
            <span class="search-count" id="searchCount"></span>
        </div>
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="essential">⭐ Thiết yếu</button>
            <button class="filter-btn" data-filter="common">🔥 Thường gặp</button>
            <button class="filter-btn" data-filter="advanced">💎 Nâng cao</button>
        </div>
    </header>

    <main id="mainContent"></main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <button class="back-to-top" id="backToTop" title="Lên đầu trang">↑</button>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
