<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPIK II — Ngữ Pháp Toàn Tập</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c15;
    --bg2: #15121f;
    --bg3: #1c1829;
    --border: #272138;
    --purple: #9d7fe8;
    --purple-dim: #4a3880;
    --blue: #5b9de8;
    --blue-dim: #1e3a5f;
    --green: #52c47a;
    --red: #e05c5c;
    --orange: #e8954a;
    --teal: #4ac4c4;
    --text: #eceaf4;
    --text2: #9e9ab0;
    --text3: #5a5568;
    --card-shadow: 0 2px 28px rgba(0,0,0,0.6);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px; line-height: 1.65; min-height: 100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0e0c15 0%, #15121f 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px 12px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .logo { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-kr { font-family: 'Noto Serif KR', serif; font-size: 21px; font-weight: 700; color: var(--purple); letter-spacing: 2px; }
  .logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
  .logo-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    background: linear-gradient(135deg, var(--purple-dim), #6b3fa0);
    color: #d4b8ff; border-radius: 4px; padding: 2px 7px; margin-left: 10px; align-self: center;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .stats { font-size: 11px; color: var(--text3); display: flex; gap: 16px; }
  .stats span { display: flex; align-items: center; gap: 4px; }
  .stats strong { color: var(--purple); }

  /* LEVEL FILTER */
  .level-tabs { display: flex; gap: 4px; }
  .lvtab {
    font-size: 11px; padding: 5px 11px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text3); cursor: pointer; font-family: inherit; font-weight: 600;
    transition: all .15s;
  }
  .lvtab:hover { border-color: var(--purple-dim); color: var(--text2); }
  .lvtab.active { background: var(--purple-dim); border-color: var(--purple); color: #d4b8ff; }

  /* SEARCH */
  .search-wrap { position: relative; }
  .search-wrap input {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 14px 8px 34px;
    width: 220px; outline: none; transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--purple-dim); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 63px); }

  /* SIDEBAR */
  aside {
    width: 215px; min-width: 215px; background: var(--bg2);
    border-right: 1px solid var(--border); padding: 14px 0;
    position: sticky; top: 63px; height: calc(100vh - 63px); overflow-y: auto;
  }
  aside::-webkit-scrollbar { width: 3px; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sidebar-section { padding: 8px 14px 3px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-top: 6px; }
  .cat-btn {
    display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 16px;
    background: none; border: none; color: var(--text2); font-family: inherit; font-size: 12px;
    text-align: left; cursor: pointer; transition: all .15s; border-left: 2px solid transparent;
  }
  .cat-btn:hover { background: var(--bg3); color: var(--text); }
  .cat-btn.active { background: var(--bg3); color: var(--purple); border-left-color: var(--purple); font-weight: 600; }
  .cat-btn .cnt { margin-left: auto; font-size: 10px; background: var(--bg); padding: 1px 6px; border-radius: 10px; color: var(--text3); }
  .cat-btn.active .cnt { color: var(--purple-dim); }
  .cat-emoji { width: 18px; text-align: center; }

  /* MAIN */
  main { flex: 1; padding: 22px 26px; max-width: 920px; overflow-y: auto; }
  main::-webkit-scrollbar { width: 4px; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .cat-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .cat-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--purple); }
  .cat-desc { font-size: 12px; color: var(--text3); flex: 1; }
  .cat-count { font-size: 11px; color: var(--text3); background: var(--bg2); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }

  /* CARD */
  .grammar-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; box-shadow: var(--card-shadow); transition: border-color .2s; }
  .grammar-card:hover { border-color: #32284a; }
  .card-head { display: flex; align-items: center; gap: 12px; padding: 13px 18px; cursor: pointer; user-select: none; }
  .card-head:hover { background: var(--bg3); }

  .pattern-tag {
    font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700;
    color: var(--purple); background: rgba(157,127,232,0.1);
    border: 1px solid rgba(157,127,232,0.25); padding: 4px 12px; border-radius: 6px; white-space: nowrap;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-meaning { font-weight: 600; font-size: 13px; color: var(--text); }
  .card-level { font-size: 10.5px; color: var(--text3); margin-top: 2px; display: flex; gap: 6px; align-items: center; }

  .level-badge { font-size: 9.5px; padding: 2px 7px; border-radius: 4px; font-weight: 700; letter-spacing: 0.5px; }
  .lv3 { background: rgba(76,196,196,0.15); color: var(--teal); border: 1px solid rgba(76,196,196,0.3); }
  .lv4 { background: rgba(91,157,232,0.15); color: var(--blue); border: 1px solid rgba(91,157,232,0.3); }
  .lv5 { background: rgba(232,149,74,0.15); color: var(--orange); border: 1px solid rgba(232,149,74,0.3); }
  .lv6 { background: rgba(224,92,92,0.15); color: var(--red); border: 1px solid rgba(224,92,92,0.3); }

  .chevron { color: var(--text3); font-size: 11px; transition: transform .25s; flex-shrink: 0; }
  .grammar-card.open .chevron { transform: rotate(180deg); }
  .card-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
  .grammar-card.open .card-body { display: block; }

  /* SECTIONS */
  .section { margin-top: 13px; }
  .section-label { font-size: 9.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .structure-box { background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--purple); border-radius: 6px; padding: 10px 14px; font-family: 'Noto Serif KR', serif; font-size: 14px; color: var(--purple); }
  .structure-note { font-size: 11.5px; color: var(--text2); margin-top: 5px; line-height: 1.5; }

  .conj-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 4px; }
  .conj-table th { background: var(--bg3); color: var(--text3); font-weight: 500; padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: 0.5px; }
  .conj-table td { padding: 7px 10px; border-bottom: 1px solid rgba(39,33,56,0.6); color: var(--text2); vertical-align: top; }
  .conj-table tr:last-child td { border-bottom: none; }
  .conj-table td:first-child { color: var(--text); font-weight: 500; }
  .kr { font-family: 'Noto Serif KR', serif; color: var(--text); }
  .kr-p { font-family: 'Noto Serif KR', serif; color: var(--purple); }

  .usage-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .usage-list li { display: flex; gap: 8px; align-items: flex-start; font-size: 12.5px; color: var(--text2); }
  .usage-list li::before { content: '▸'; color: var(--teal); flex-shrink: 0; margin-top: 2px; }

  .example-list { display: flex; flex-direction: column; gap: 9px; }
  .example-item { background: var(--bg3); border-radius: 8px; padding: 10px 14px; border-left: 2px solid var(--purple-dim); }
  .example-kr { font-family: 'Noto Serif KR', serif; font-size: 14.5px; color: var(--text); margin-bottom: 2px; }
  .highlight { color: var(--purple); font-weight: 700; }
  .example-rom { font-size: 11px; color: var(--text3); font-style: italic; margin-bottom: 3px; }
  .example-vi { font-size: 12.5px; color: var(--teal); }

  .note-box { background: rgba(157,127,232,0.05); border: 1px solid rgba(157,127,232,0.18); border-radius: 8px; padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start; }
  .note-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .note-content { font-size: 12.5px; color: var(--text2); line-height: 1.6; }

  .warn-box { background: rgba(232,149,74,0.05); border: 1px solid rgba(232,149,74,0.2); border-radius: 8px; padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start; }
  .warn-content { font-size: 12.5px; color: var(--text2); }

  .compare-box { background: rgba(224,92,92,0.05); border: 1px solid rgba(224,92,92,0.18); border-radius: 8px; padding: 10px 14px; font-size: 12.5px; color: var(--text2); line-height: 1.6; }
  .compare-box strong { color: var(--red); }

  /* TOPIK TIP */
  .topik-tip { background: rgba(82,196,122,0.05); border: 1px solid rgba(82,196,122,0.2); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--text2); display: flex; gap: 8px; }
  .topik-tip-icon { color: var(--green); flex-shrink: 0; }

  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: #1c1829; color: var(--text3); border: 1px solid var(--border); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .search-match { background: rgba(157,127,232,0.25); border-radius: 2px; color: var(--purple); }

  @media (max-width: 700px) { aside { display: none; } main { padding: 14px; } }
</style>
</head>

  <div style="display:flex;align-items:center">

  </div>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

// ====================== APP ======================
const cats = [...new Set(G.map(g => g.cat))];
const catIcons = {};
G.forEach(g => catIcons[g.cat] = g.catIcon);

let currentCat = cats[0];
let searchQuery = '';
let levelFilter = 'all';

document.getElementById('total-grammar').textContent = G.length;
document.getElementById('total-cats').textContent = cats.length;

// Level tabs
document.querySelectorAll('.lvtab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.lvtab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    levelFilter = t.dataset.lv;
    buildSidebar();
    buildMain();
  });
});

function filterItems(items) {
  if (levelFilter === 'all') return items;
  return items.filter(g => String(g.level) === levelFilter);
}

function buildSidebar() {
  const aside = document.getElementById('sidebar');
  let html = '<div class="sidebar-section">Chủ đề</div>';
  cats.forEach(cat => {
    const count = filterItems(G.filter(g => g.cat === cat)).length;
    if (count === 0 && levelFilter !== 'all') return;
    const isActive = cat === currentCat;
    html += `<button class="cat-btn${isActive ? ' active' : ''}" data-cat="${cat}">
      <span class="cat-emoji">${catIcons[cat]}</span>
      <span>${cat.split(' (')[0]}</span>
      <span class="cnt">${count}</span>
    </button>`;
  });
  aside.innerHTML = html;
  aside.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      searchQuery = '';
      document.getElementById('search').value = '';
      buildSidebar();
      buildMain();
    });
  });
}

function hl(text) {
  if (!searchQuery || !text) return text || '';
  const re = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<span class="search-match">$1</span>');
}

function lvBadge(l) {
  const map = {3:'lv3',4:'lv4',5:'lv5',6:'lv6'};
  return `<span class="level-badge ${map[l]||'lv3'}">LV${l}</span>`;
}

function renderCard(g) {
  let structureHtml = g.structure ? `<div class="section">
    <div class="section-label">Cấu trúc</div>
    <div class="structure-box">${hl(g.structure)}</div>
    ${g.structureNote ? `<div class="structure-note">→ ${hl(g.structureNote)}</div>` : ''}
  </div>` : '';

  let conjHtml = '';
  if (g.conj && g.conj.length) {
    conjHtml = `<div class="section">
      <div class="section-label">Biến đổi / So sánh</div>
      <table class="conj-table"><thead><tr><th>Dạng</th><th>Kết quả / Ví dụ</th><th>Ghi chú</th></tr></thead><tbody>
        ${g.conj.map(([a,b,c]) => `<tr><td>${hl(a)}</td><td class="kr-p">${hl(b)}</td><td style="font-size:11px;color:var(--text2)">${hl(c||'')}</td></tr>`).join('')}
      </tbody></table>
    </div>`;
  }

  let usageHtml = g.usage && g.usage.length ? `<div class="section">
    <div class="section-label">Cách dùng</div>
    <ul class="usage-list">${g.usage.map(u => `<li>${hl(u)}</li>`).join('')}</ul>
  </div>` : '';

  let exHtml = g.examples && g.examples.length ? `<div class="section">
    <div class="section-label">Ví dụ</div>
    <div class="example-list">
      ${g.examples.map(e => `<div class="example-item">
        <div class="example-kr">${e.kr}</div>
        ${e.rom ? `<div class="example-rom">${hl(e.rom)}</div>` : ''}
        <div class="example-vi">→ ${hl(e.vi)}</div>
      </div>`).join('')}
    </div>
  </div>` : '';

  let notesHtml = g.notes ? `<div class="section"><div class="note-box"><span class="note-icon">💡</span><div class="note-content">${hl(g.notes)}</div></div></div>` : '';

  let warnHtml = g.warn ? `<div class="section"><div class="warn-box"><span class="note-icon">⚠️</span><div class="warn-content">${hl(g.warn)}</div></div></div>` : '';

  let compareHtml = g.compare ? `<div class="section">
    <div class="section-label">So sánh / Phân biệt</div>
    <div class="compare-box">${hl(g.compare)}</div>
  </div>` : '';

  let tipHtml = g.topikTip ? `<div class="section"><div class="topik-tip"><span class="topik-tip-icon">📝</span><span>${hl(g.topikTip)}</span></div></div>` : '';

  let tagsHtml = g.tags ? `<div class="tags">${g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : '';

  return `<div class="grammar-card" id="card-${g.id}">
    <div class="card-head" onclick="toggleCard('${g.id}')">
      <div class="pattern-tag">${g.pattern}</div>
      <div class="card-meta">
        <div class="card-meaning">${hl(g.meaning)}</div>
        <div class="card-level">${lvBadge(g.level)}</div>
      </div>
      <div class="chevron">▼</div>
    </div>
    <div class="card-body">
      ${structureHtml}${conjHtml}${usageHtml}${exHtml}${compareHtml}${notesHtml}${warnHtml}${tipHtml}${tagsHtml}
    </div>
  </div>`;
}

function buildMain() {
  const main = document.getElementById('main');

  if (searchQuery.length >= 2) {
    const q = searchQuery.toLowerCase();
    let items = G.filter(g =>
      g.pattern.toLowerCase().includes(q) ||
      g.meaning.toLowerCase().includes(q) ||
      (g.usage||[]).some(u => u.toLowerCase().includes(q)) ||
      (g.notes||'').toLowerCase().includes(q) ||
      (g.compare||'').toLowerCase().includes(q) ||
      (g.examples||[]).some(e => e.vi.toLowerCase().includes(q) || e.kr.toLowerCase().includes(q))
    );
    items = filterItems(items);
    main.innerHTML = `<div class="cat-header">
      <div class="cat-title">🔍 Kết quả tìm kiếm</div>
      <span class="cat-count">${items.length} ngữ pháp</span>
    </div>
    ${items.length === 0 ? `<div class="empty"><div class="empty-icon">🔍</div><h3 style="color:var(--text2)">Không tìm thấy</h3><p style="color:var(--text3);font-size:13px">Thử từ khóa khác bro</p></div>` : items.map(renderCard).join('')}`;
    return;
  }

  let items = filterItems(G.filter(g => g.cat === currentCat));
  const catIcon = catIcons[currentCat] || '📌';
  main.innerHTML = `<div class="cat-header">
    <div class="cat-title">${catIcon} ${currentCat.split(' (')[0]}</div>
    <span class="cat-count">${items.length} ngữ pháp</span>
  </div>
  ${items.length === 0 ? `<div class="empty"><div class="empty-icon">📭</div><h3 style="color:var(--text2)">Không có ngữ pháp</h3><p style="color:var(--text3);font-size:13px">Chọn bộ lọc cấp độ khác nhé</p></div>` : items.map(renderCard).join('')}`;
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  if (el) el.classList.toggle('open');
}

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    buildSidebar();
    buildMain();
  }, 250);
});

buildSidebar();
buildMain();
</script>
</body>
</html>
