<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ vựng Tiếng Hàn – Cảm xúc & Tâm lý</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf0f4;
    --card: #fff;
    --accent: #8a1a4a;
    --text: #280818;
    --sub: #9a5070;
    --border: #ecc8d4;
    --tag-pos: #e0f8e8;
    --tag-neg: #fce8e8;
    --tag-neutral: #e8f0fa;
    --tag-social: #fef0d8;
    --tag-mind: #f0e8fa;
    --highlight: #fff0f5;
    --row-alt: #fdf8fa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Be Vietnam Pro',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .header { background:var(--text); color:#fdf0f4; padding:36px 40px 28px; position:relative; overflow:hidden; }
  .header::before { content:'감정'; position:absolute; right:40px; top:50%; transform:translateY(-50%); font-family:'Noto Serif KR',serif; font-size:120px; color:rgba(255,255,255,.05); font-weight:600; letter-spacing:-4px; user-select:none; }
  .header h1 { font-family:'Noto Serif KR',serif; font-size:28px; font-weight:600; letter-spacing:1px; margin-bottom:6px; }
  .header p { font-size:13px; font-weight:300; color:#b07090; letter-spacing:.5px; }
  .count-badge { display:inline-block; background:var(--accent); color:#fff; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; margin-top:10px; letter-spacing:.5px; }
  .controls { padding:20px 40px; background:var(--card); border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:center; flex-wrap:wrap; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .search-wrap { position:relative; flex:1; min-width:200px; }
  .search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--sub); }
  #searchInput { width:100%; padding:10px 12px 10px 38px; border:1.5px solid var(--border); border-radius:8px; font-family:'Be Vietnam Pro',sans-serif; font-size:14px; background:var(--bg); color:var(--text); outline:none; transition:border-color .2s; }
  #searchInput:focus { border-color:var(--accent); }
  #searchInput::placeholder { color:var(--sub); }
  .filter-btn { padding:7px 12px; border:1.5px solid var(--border); border-radius:8px; background:var(--bg); font-family:'Be Vietnam Pro',sans-serif; font-size:11px; font-weight:500; color:var(--sub); cursor:pointer; transition:all .2s; white-space:nowrap; }
  .filter-btn:hover,.filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .result-count { font-size:12px; color:var(--sub); white-space:nowrap; }
  .table-wrap { padding:24px 40px 60px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  thead { background:var(--text); color:#fdf0f4; }
  th { padding:14px 16px; text-align:left; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
  th:nth-child(1),td:nth-child(1) { width:60px; text-align:center; }
  th:nth-child(2),td:nth-child(2) { width:145px; }
  th:nth-child(3),td:nth-child(3) { width:185px; }
  th:nth-child(4),td:nth-child(4) { width:210px; }
  th:nth-child(5),td:nth-child(5) { width:120px; }
  th:nth-child(6),td:nth-child(6) { min-width:280px; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
  tbody tr:nth-child(even) { background:var(--row-alt); }
  tbody tr:hover { background:var(--highlight); }
  td { padding:12px 16px; font-size:13.5px; vertical-align:middle; line-height:1.5; }
  td:nth-child(1) { font-size:11px; color:var(--sub); font-weight:600; }
  .korean-word { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:600; color:var(--accent); display:block; line-height:1.3; }
  .tag { display:inline-flex; align-items:center; border-radius:4px; padding:2px 8px; font-size:11px; font-weight:500; white-space:nowrap; }
  .tag-pos     { background:var(--tag-pos);     color:#0a4a20; }
  .tag-neg     { background:var(--tag-neg);     color:#7a0a10; }
  .tag-neutral { background:var(--tag-neutral); color:#0a2a60; }
  .tag-social  { background:var(--tag-social);  color:#5a3000; }
  .tag-mind    { background:var(--tag-mind);    color:#4a0a6a; }
  .note { font-size:12px; color:var(--sub); font-style:italic; }
  .no-results { text-align:center; padding:60px; color:var(--sub); font-size:15px; display:none; }
  .footer { text-align:center; padding:20px; font-size:11px; color:var(--sub); border-top:1px solid var(--border); }
  @media(max-width:768px){.header{padding:24px 20px}.header::before{display:none}.controls{padding:16px 20px}.table-wrap{padding:16px 20px 40px}th,td{padding:10px 12px}.korean-word{font-size:15px}}
</style>
</head>
<body>
<div class="header">
  <h1>감정 & 심리 — Cảm xúc & Tâm lý</h1>
  <p>Từ vựng Tiếng Hàn chủ đề Cảm xúc & Tâm lý · Chủ đề TOPIK I & II</p>
  <span class="count-badge" id="totalCount"></span>
</div>
<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Tìm kiếm: tiếng Hàn, tiếng Anh, tiếng Việt...">
  </div>
  <button class="filter-btn active" data-filter="all">Tất cả</button>
  <button class="filter-btn" data-filter="pos">Tích cực</button>
  <button class="filter-btn" data-filter="neg">Tiêu cực</button>
  <button class="filter-btn" data-filter="neutral">Trung tính</button>
  <button class="filter-btn" data-filter="social">Ứng xử xã hội</button>
  <button class="filter-btn" data-filter="mind">Tư duy & Ý chí</button>
  <span class="result-count" id="resultCount"></span>
</div>
<div class="table-wrap">
  <table id="vocabTable">
    <thead><tr><th>#</th><th>Tiếng Hàn</th><th>Tiếng Anh</th><th>Tiếng Việt</th><th>Phân loại</th><th>Ghi chú &amp; Cách dùng</th></tr></thead>
    <tbody id="vocabBody"></tbody>
  </table>
  <div class="no-results" id="noResults">😕 Không tìm thấy từ nào phù hợp.</div>
</div>
<div class="footer">Tổng hợp từ vựng tiếng Hàn – Chủ đề Cảm xúc &amp; Tâm lý</div>
<script>
const vocab=[
  {kr:"갈등",en:"conflict, inner conflict",vi:"mâu thuẫn, xung đột",type:"neg",note:"갈등(葛藤). 갈등을 겪다(trải qua mâu thuẫn). 내면의 갈등(mâu thuẫn nội tâm). 갈등을 해결하다(giải quyết mâu thuẫn)."},
  {kr:"감정",en:"emotion, feeling",vi:"cảm xúc, tình cảm",type:"neutral",note:"감정(感情). 감정을 표현하다(bày tỏ cảm xúc). 감정이 풍부하다(cảm xúc phong phú). 감정을 조절하다."},
  {kr:"감탄",en:"admiration, exclamation",vi:"sự ngưỡng mộ, thán phục",type:"pos",note:"감탄(感歎). 감탄하다=thán phục. 감탄사(thán từ). 정말 감탄스러워요(thật sự thán phục quá)."},
  {kr:"개성",en:"individuality, personality",vi:"tính cá nhân, cá tính",type:"neutral",note:"개성(個性). 개성이 강하다(cá tính mạnh). 개성을 살리다(phát huy cá tính). 개성 있는 스타일."},
  {kr:"거절",en:"rejection, refusal",vi:"sự từ chối",type:"neg",note:"거절(拒絶). 거절하다=từ chối. 부탁을 거절하다(từ chối lời nhờ). 거절당하다(bị từ chối). 정중히 거절하다."},
  {kr:"거짓",en:"lie, falsehood",vi:"sự dối trá, điều giả dối",type:"neg",note:"거짓(虛僞). 거짓말(lời nói dối). 거짓을 말하다(nói dối). ↔ 진실(sự thật). 거짓으로 속이다(lừa dối)."},
  {kr:"걱정거리",en:"source of worry",vi:"mối lo, điều lo lắng",type:"neg",note:"걱정(lo lắng)+거리(điều). 걱정거리가 많다(nhiều mối lo). 걱정거리를 털어놓다(giải bày mối lo)."},
  {kr:"겁",en:"fear, cowardice",vi:"sự sợ hãi",type:"neg",note:"겁이 나다(cảm thấy sợ). 겁이 많다(nhát gan). 겁쟁이(kẻ nhát gan). 겁을 먹다(bị sợ)."},
  {kr:"격려",en:"encouragement",vi:"sự khích lệ, động viên",type:"pos",note:"격려(激勵). 격려하다=khích lệ. 격려의 말(lời động viên). 격려를 받다(nhận được khích lệ). 응원과 유사."},
  {kr:"결심",en:"decision, resolution",vi:"quyết tâm, quyết định",type:"mind",note:"결심(決心). 결심하다=quyết tâm. 굳은 결심(quyết tâm vững chắc). 결심을 바꾸다(thay đổi quyết định)."},
  {kr:"겸손",en:"humility, modesty",vi:"sự khiêm tốn",type:"pos",note:"겸손(謙遜). 겸손하다=khiêm tốn. 겸손한 태도(thái độ khiêm tốn). 겸손이 덕이다(khiêm tốn là đức hạnh)."},
  {kr:"고마움",en:"gratitude, thankfulness",vi:"lòng biết ơn",type:"pos",note:"고맙다→고마움. 고마움을 표현하다(bày tỏ lòng biết ơn). 고마움을 느끼다(cảm thấy biết ơn)."},
  {kr:"고민",en:"worry, concern, trouble",vi:"lo lắng, băn khoăn",type:"neg",note:"고민(苦悶). 고민하다=băn khoăn. 고민이 많다(nhiều nỗi lo). 고민을 털어놓다(giải bày nỗi lo). 고민 상담."},
  {kr:"고백",en:"confession; love confession",vi:"lời thú nhận, lời tỏ tình",type:"social",note:"고백(告白). 두 가지: 사랑 고백(tỏ tình), 잘못 고백(thú nhận lỗi). 고백하다=thú nhận/tỏ tình."},
  {kr:"고생",en:"hardship, suffering",vi:"vất vả, khổ cực",type:"neg",note:"고생(苦生). 고생하다=vất vả. 고생이 많다(vất vả nhiều). 고생 끝에 낙이 온다(hết khổ đến sướng)."},
  {kr:"고집",en:"stubbornness, persistence",vi:"sự bướng bỉnh, cố chấp",type:"neg",note:"고집(固執). 고집이 세다(bướng bỉnh). 고집을 부리다(cố chấp). 고집을 꺾다(bỏ sự cứng đầu)."},
  {kr:"고통",en:"pain, agony, suffering",vi:"nỗi đau, sự đau khổ",type:"neg",note:"고통(苦痛). 고통을 겪다(chịu đựng đau khổ). 고통스럽다(đau khổ). 고통을 이겨내다(vượt qua đau khổ)."},
  {kr:"곤란",en:"difficulty, embarrassment",vi:"khó khăn, tình huống khó xử",type:"neg",note:"곤란(困難). 곤란하다=khó xử. 곤란한 상황(tình huống khó xử). 곤란을 겪다(gặp khó khăn)."},
  {kr:"공포",en:"fear, terror, horror",vi:"nỗi sợ hãi, kinh hoàng",type:"neg",note:"공포(恐怖). 공포를 느끼다(cảm thấy kinh hoàng). 공포 영화(phim kinh dị). 공포심(tâm lý sợ hãi)."},
  {kr:"괴로움",en:"agony, distress",vi:"nỗi đau khổ, khổ sở",type:"neg",note:"괴롭다→괴로움. 괴로움을 참다(chịu đựng nỗi khổ). 마음의 괴로움(nỗi khổ tâm hồn). 고통과 유사."},
  {kr:"구두쇠",en:"miser, stingy person",vi:"người keo kiệt, bủn xỉn",type:"neg",note:"구두쇠. 구두쇠처럼 굴다(hành xử như người keo kiệt). 짠돌이와 유사. 돈을 안 쓰는 사람."},
  {kr:"궁금증",en:"curiosity, question",vi:"sự tò mò",type:"neutral",note:"궁금하다→궁금증. 궁금증을 풀다(giải tỏa tò mò). 궁금증이 생기다(nảy sinh tò mò). 호기심과 유사."},
  {kr:"기대",en:"expectation, anticipation",vi:"kỳ vọng, mong đợi",type:"pos",note:"기대(期待). 기대하다=kỳ vọng. 기대에 부응하다(đáp ứng kỳ vọng). 기대를 저버리다(phụ kỳ vọng)."},
  {kr:"기쁨",en:"joy, happiness",vi:"niềm vui, hạnh phúc",type:"pos",note:"기쁘다→기쁨. 기쁨을 느끼다(cảm nhận niềm vui). 기쁨을 나누다(chia sẻ niềm vui). ↔ 슬픔(nỗi buồn)."},
  {kr:"기억",en:"memory, recollection",vi:"ký ức, sự ghi nhớ",type:"neutral",note:"기억(記憶). 기억하다=nhớ. 기억력(trí nhớ). 기억이 나다(nhớ ra). 추억과 유사하나 더 일반적."},
  {kr:"긴장감",en:"sense of tension, nervousness",vi:"cảm giác hồi hộp",type:"neg",note:"긴장(緊張)+감(感). 긴장감을 느끼다(cảm thấy hồi hộp). 긴장감이 돌다(không khí căng thẳng)."},
  {kr:"노력",en:"effort, endeavor",vi:"nỗ lực, cố gắng",type:"mind",note:"노력(努力). 노력하다=nỗ lực. 노력이 필요하다(cần nỗ lực). 노력 없이는 성공 없다(không nỗ lực không thành công)."},
  {kr:"농담",en:"joke, jest",vi:"câu đùa, trò đùa",type:"social",note:"농담(弄談). 농담하다=đùa. 농담으로 하는 말(nói đùa). 농담이에요(tôi nói đùa thôi). 진담 ↔ 농담."},
  {kr:"눈치",en:"social awareness, tact",vi:"sự nhạy cảm, tinh ý",type:"neutral",note:"눈치가 빠르다(nhạy bén). 눈치가 없다(không tinh ý). 눈치를 보다(quan sát để đọc tình huống). 한국 특유의 개념."},
  {kr:"다행",en:"fortunate, relief",vi:"may mắn, may",type:"pos",note:"다행(多幸). 다행이다=may mắn quá. 다행히(may mà). 다행이에요(may quá). 불행 ↔ 다행."},
  {kr:"대접",en:"hospitality, treating someone",vi:"tiếp đãi, đãi khách",type:"social",note:"대접(待接). 대접하다=tiếp đãi. 손님을 대접하다(tiếp đón khách). 대접을 받다(được tiếp đãi)."},
  {kr:"덕",en:"virtue; thanks to",vi:"ơn, nhờ (ai đó)",type:"pos",note:"덕(德). 덕분에(nhờ vào). 선생님 덕분에(nhờ thầy). 덕을 베풀다(ban ơn). 덕이 있다(có đức hạnh)."},
  {kr:"도전",en:"challenge",vi:"thách thức, thử thách",type:"mind",note:"도전(挑戰). 도전하다=thử thách. 도전 정신(tinh thần thách thức). 새로운 도전(thử thách mới). 도전을 받아들이다."},
  {kr:"두려움",en:"fear, dread",vi:"nỗi sợ hãi",type:"neg",note:"두렵다→두려움. 두려움을 극복하다(vượt qua nỗi sợ). 두려움이 앞서다(nỗi sợ đến trước). 공포와 유사."},
  {kr:"드림",en:"dream (in compound words)",vi:"mơ ước (từ ghép)",type:"pos",note:"드리다/꿈에서 파생. 코리안 드림(Korean Dream). 드림을 이루다(thực hiện mơ ước). 꿈과 유사."},
  {kr:"마음씨",en:"heart, disposition",vi:"tấm lòng, lòng tốt",type:"pos",note:"마음(tâm)+씨(hạt/tính chất). 마음씨가 좋다(lòng tốt). 착한 마음씨(tấm lòng tốt). 마음씨가 고운 사람."},
  {kr:"만족",en:"satisfaction",vi:"sự thỏa mãn, hài lòng",type:"pos",note:"만족(滿足). 만족하다=thỏa mãn. 만족스럽다(hài lòng). 만족감(cảm giác hài lòng). ↔ 불만(không hài lòng)."},
  {kr:"만족감",en:"feeling of satisfaction",vi:"cảm giác thỏa mãn",type:"pos",note:"만족(hài lòng)+감(感). 만족감을 느끼다(cảm thấy thỏa mãn). 만족감이 크다(độ hài lòng cao)."},
  {kr:"말다툼",en:"quarrel, argument",vi:"cãi vã, tranh cãi",type:"neg",note:"말(lời)+다툼(tranh cãi). 말다툼을 하다(cãi vã). 사소한 말다툼(cãi vã nhỏ nhặt). 싸움과 유사하나 언어적."},
  {kr:"말투",en:"way of speaking, tone",vi:"cách nói chuyện",type:"neutral",note:"말(lời)+투(cách). 말투가 거칠다/부드럽다(giọng thô/nhẹ nhàng). 말투를 조심하다(chú ý cách nói)."},
  {kr:"맞이",en:"greeting, welcoming",vi:"chào đón, đón tiếp",type:"social",note:"맞이하다=đón tiếp. 새해를 맞이하다(đón chào năm mới). 손님을 맞이하다(đón khách). 환영과 유사."},
  {kr:"매력",en:"charm, attraction",vi:"sức hút, sức quyến rũ",type:"pos",note:"매력(魅力). 매력이 있다(có sức hút). 매력적인 사람(người hấp dẫn). 매력을 느끼다(cảm thấy bị thu hút)."},
  {kr:"명랑",en:"cheerfulness",vi:"vui vẻ, sảng khoái",type:"pos",note:"명랑(明朗). 명랑하다=vui vẻ, sảng khoái. 명랑한 성격(tính cách vui vẻ). 명랑하게 웃다(cười tươi tắn)."},

  {kr:"큰소리",en:"loud voice; boasting",vi:"tiếng to, tiếng lớn",type:"social",note:"두 가지: (1) 큰 소리(tiếng to — 큰소리로 말하다=nói to), (2) 큰소리치다(khoe khoang, nổ). 주의 필요."},

  {kr:"포기",en:"giving up, abandonment",vi:"từ bỏ, bỏ cuộc",type:"neg",note:"포기(抛棄). 포기하다=từ bỏ. 포기하지 마세요(đừng bỏ cuộc). 포기는 배추 셀 때만(đùa vui: 포기 = đầu cải thảo)."},
  {kr:"핑계",en:"excuse, pretext",vi:"lý do bào chữa, cớ",type:"neg",note:"핑계(憑藉). 핑계를 대다(đưa ra lý do bào chữa). 핑계 없다(không có lý do). 변명과 유사. 핑계쟁이."},
  {kr:"한숨",en:"sigh",vi:"tiếng thở dài",type:"neg",note:"한숨을 쉬다(thở dài). 한숨이 나다(buột miệng thở dài). 한숨을 내쉬다(thở ra dài). 걱정이나 피로할 때."},
  {kr:"행동",en:"action, behavior",vi:"hành động, hành vi",type:"neutral",note:"행동(行動). 행동하다=hành động. 책임 있는 행동(hành động có trách nhiệm). 행동이 말보다 중요해요."},
  {kr:"행운",en:"good luck, fortune",vi:"may mắn, hạnh vận",type:"pos",note:"행운(幸運). 행운을 빌다(chúc may mắn). 행운아(người may mắn). 행운이 따르다(may mắn đến). 행운의 숫자."},
  {kr:"허락",en:"permission, approval",vi:"sự cho phép, chấp thuận",type:"social",note:"허락(許諾). 허락하다=cho phép. 허락을 받다(được cho phép). 허락 없이(không có phép). 허락을 구하다."},

  {kr:"희망",en:"hope",vi:"hy vọng",type:"pos",note:"희망(希望). 희망을 갖다(có hy vọng). 희망을 잃지 마세요(đừng mất hy vọng). 희망적이다(đầy hy vọng). 소망과 유사."},
];
let currentFilter='all';
function renderTable(data){
  const tbody=document.getElementById('vocabBody');
  tbody.innerHTML='';
  data.forEach((item,i)=>{
    let t;
    if(item.type==='pos')     t=`<span class="tag tag-pos">Tích cực</span>`;
    else if(item.type==='neg')     t=`<span class="tag tag-neg">Tiêu cực</span>`;
    else if(item.type==='neutral') t=`<span class="tag tag-neutral">Trung tính</span>`;
    else if(item.type==='social')  t=`<span class="tag tag-social">Ứng xử XH</span>`;
    else                           t=`<span class="tag tag-mind">Tư duy &amp; Ý chí</span>`;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td><span class="korean-word">${item.kr}</span></td><td>${item.en}</td><td>${item.vi}</td><td>${t}</td><td><span class="note">${item.note}</span></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('resultCount').textContent=`${data.length} / ${vocab.length} từ`;
}
function filterAndSearch(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const result=vocab.filter(item=>{
    const mf=currentFilter==='all'||item.type===currentFilter;
    const ms=!q||item.kr.includes(q)||item.en.toLowerCase().includes(q)||item.vi.toLowerCase().includes(q)||item.note.toLowerCase().includes(q);
    return mf&&ms;
  });
  renderTable(result);
  document.getElementById('noResults').style.display=result.length===0?'block':'none';
  document.getElementById('vocabTable').style.display=result.length===0?'none':'';
}
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    filterAndSearch();
  });
});
document.getElementById('searchInput').addEventListener('input',filterAndSearch);
document.getElementById('totalCount').textContent=vocab.length+' từ';
renderTable(vocab);
</script>
</body>
</html>
