<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPIK II LV5-6 — Ngữ Pháp Nâng Cao</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e12;
    --bg2: #111620;
    --bg3: #181e2c;
    --border: #1e2638;
    --gold: #d4a843;
    --gold2: #f0c96e;
    --gold-dim: #5a4015;
    --red: #e05c5c;
    --teal: #3ecfb8;
    --blue: #4a90d9;
    --purple: #a07ee8;
    --orange: #e89450;
    --green: #52c47a;
    --text: #eef0f5;
    --text2: #9aa0b8;
    --text3: #4a5070;
    --shadow: 0 4px 32px rgba(0,0,0,0.7);
    --radius: 12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;font-size:14px;line-height:1.65;min-height:100vh;}

  /* HEADER */
  header{
    background:linear-gradient(135deg,#0a0e12 0%,#111620 50%,#0d1220 100%);
    border-bottom:1px solid var(--border);
    padding:16px 24px 13px;
    position:sticky;top:0;z-index:100;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  }
  .logo{display:flex;flex-direction:column;line-height:1.1;}
  .logo-kr{font-family:'Noto Serif KR',serif;font-size:21px;font-weight:700;
    background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .logo-sub{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
  .badge-row{display:flex;gap:6px;align-self:center;margin-left:10px;}
  .badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;padding:3px 8px;}
  .badge-lv5{background:rgba(232,148,80,0.15);color:var(--orange);border:1px solid rgba(232,148,80,0.3);}
  .badge-lv6{background:rgba(224,92,92,0.15);color:var(--red);border:1px solid rgba(224,92,92,0.3);}

  .header-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .stats{font-size:11px;color:var(--text3);display:flex;gap:16px;}
  .stats span{display:flex;align-items:center;gap:4px;}
  .stats strong{color:var(--gold);}

  .level-tabs{display:flex;gap:4px;}
  .lvtab{font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid var(--border);
    background:var(--bg3);color:var(--text3);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;}
  .lvtab:hover{border-color:var(--gold-dim);color:var(--text2);}
  .lvtab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold2);}

  .search-wrap{position:relative;}
  .search-wrap input{
    background:var(--bg3);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:inherit;font-size:13px;padding:8px 14px 8px 34px;
    width:220px;outline:none;transition:border-color .2s;
  }
  .search-wrap input:focus{border-color:var(--gold-dim);}
  .search-wrap input::placeholder{color:var(--text3);}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;}

  /* LAYOUT */
  .layout{display:flex;min-height:calc(100vh - 65px);}
  aside{
    width:215px;min-width:215px;background:var(--bg2);
    border-right:1px solid var(--border);padding:14px 0;
    position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto;
  }
  aside::-webkit-scrollbar{width:3px;}
  aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .sidebar-section{padding:8px 14px 3px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:6px;}
  .cat-btn{
    display:flex;align-items:center;gap:8px;width:100%;padding:7px 16px;
    background:none;border:none;color:var(--text2);font-family:inherit;font-size:12px;
    text-align:left;cursor:pointer;transition:all .15s;border-left:2px solid transparent;
  }
  .cat-btn:hover{background:var(--bg3);color:var(--text);}
  .cat-btn.active{background:var(--bg3);color:var(--gold);border-left-color:var(--gold);font-weight:600;}
  .cat-btn .cnt{margin-left:auto;font-size:10px;background:var(--bg);padding:1px 6px;border-radius:10px;color:var(--text3);}
  .cat-btn.active .cnt{color:var(--gold-dim);}

  main{flex:1;padding:22px 26px;max-width:920px;overflow-y:auto;}
  main::-webkit-scrollbar{width:4px;}
  main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .cat-header{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .cat-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--gold);}
  .cat-count{font-size:11px;color:var(--text3);background:var(--bg2);padding:2px 8px;border-radius:10px;border:1px solid var(--border);}

  /* CARD */
  .grammar-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:13px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s;}
  .grammar-card:hover{border-color:#252e44;}
  .card-head{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;user-select:none;}
  .card-head:hover{background:var(--bg3);}

  .pattern-tag{
    font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;
    color:var(--gold2);background:rgba(212,168,67,0.1);
    border:1px solid rgba(212,168,67,0.22);padding:4px 12px;border-radius:6px;white-space:nowrap;
    max-width:220px;overflow:hidden;text-overflow:ellipsis;
  }
  .card-meta{flex:1;min-width:0;}
  .card-meaning{font-weight:600;font-size:13px;color:var(--text);}
  .card-level{font-size:10.5px;color:var(--text3);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}

  .level-badge{font-size:9.5px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:0.5px;}
  .lv5{background:rgba(232,148,80,0.15);color:var(--orange);border:1px solid rgba(232,148,80,0.3);}
  .lv6{background:rgba(224,92,92,0.15);color:var(--red);border:1px solid rgba(224,92,92,0.3);}
  .lv-both{background:rgba(160,126,232,0.15);color:var(--purple);border:1px solid rgba(160,126,232,0.3);}

  .chevron{color:var(--text3);font-size:11px;transition:transform .25s;flex-shrink:0;}
  .grammar-card.open .chevron{transform:rotate(180deg);}
  .card-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border);}
  .grammar-card.open .card-body{display:block;}

  /* SECTIONS */
  .section{margin-top:13px;}
  .section-label{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .structure-box{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:6px;padding:10px 14px;font-family:'Noto Serif KR',serif;font-size:14px;color:var(--gold2);}
  .structure-note{font-size:11.5px;color:var(--text2);margin-top:5px;line-height:1.5;}

  .conj-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px;}
  .conj-table th{background:var(--bg3);color:var(--text3);font-weight:500;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);font-size:11px;letter-spacing:0.5px;}
  .conj-table td{padding:7px 10px;border-bottom:1px solid rgba(30,38,56,0.6);color:var(--text2);vertical-align:top;}
  .conj-table tr:last-child td{border-bottom:none;}
  .conj-table td:first-child{color:var(--text);font-weight:500;}
  .kr-g{font-family:'Noto Serif KR',serif;color:var(--gold2);}

  .usage-list{list-style:none;display:flex;flex-direction:column;gap:5px;}
  .usage-list li{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:var(--text2);}
  .usage-list li::before{content:'▸';color:var(--teal);flex-shrink:0;margin-top:2px;}

  .example-list{display:flex;flex-direction:column;gap:9px;}
  .example-item{background:var(--bg3);border-radius:8px;padding:10px 14px;border-left:2px solid var(--gold-dim);}
  .example-kr{font-family:'Noto Serif KR',serif;font-size:14.5px;color:var(--text);margin-bottom:2px;}
  .highlight{color:var(--gold2);font-weight:700;}
  .example-rom{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:3px;}
  .example-vi{font-size:12.5px;color:var(--teal);}

  .note-box{background:rgba(212,168,67,0.05);border:1px solid rgba(212,168,67,0.18);border-radius:8px;padding:10px 14px;display:flex;gap:10px;}
  .note-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
  .note-content{font-size:12.5px;color:var(--text2);line-height:1.6;}

  .compare-box{background:rgba(224,92,92,0.05);border:1px solid rgba(224,92,92,0.18);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--text2);line-height:1.6;}
  .compare-box strong{color:var(--red);}

  .topik-tip{background:rgba(82,196,122,0.05);border:1px solid rgba(82,196,122,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text2);display:flex;gap:8px;}
  .tip-icon{color:var(--green);flex-shrink:0;}

  .freq-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;}
  .freq-hi{background:rgba(224,92,92,0.15);color:var(--red);border:1px solid rgba(224,92,92,0.25);}
  .freq-mid{background:rgba(232,148,80,0.15);color:var(--orange);border:1px solid rgba(232,148,80,0.25);}
  .freq-lo{background:rgba(74,144,217,0.15);color:var(--blue);border:1px solid rgba(74,144,217,0.25);}

  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .tag{font-size:10px;padding:2px 7px;border-radius:4px;background:#181e2c;color:var(--text3);border:1px solid var(--border);}

  .empty{text-align:center;padding:60px 20px;color:var(--text3);}
  .search-match{background:rgba(212,168,67,0.22);border-radius:2px;color:var(--gold2);}

  @media(max-width:700px){aside{display:none;}main{padding:14px;}}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <div class="logo">
      <span class="logo-kr">한국어 문법 고급</span>
      <span class="logo-sub">TOPIK II LV5–6 — Ngữ Pháp Nâng Cao</span>
    </div>
    <div class="badge-row">
      <span class="badge badge-lv5">LV5</span>
      <span class="badge badge-lv6">LV6</span>
    </div>

  <div class="header-right">
    <div class="level-tabs">
      <button class="lvtab active" data-lv="all">Tất cả</button>
      <button class="lvtab" data-lv="5"><span style="color:var(--orange)">●</span> LV5</button>
      <button class="lvtab" data-lv="6"><span style="color:var(--red)">●</span> LV6</button>
    </div>
    <div class="stats">

      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Tìm ngữ pháp…" autocomplete="off">
    </div>
  </div>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

// ─────────────────── APP ───────────────────
const cats = [...new Set(G.map(g => g.cat))];
const catIconMap = {};
G.forEach(g => catIconMap[g.cat] = g.icon);

let currentCat = cats[0];
let searchQ = '';
let lvFilter = 'all';

document.getElementById('tg').textContent = G.length;
document.getElementById('tc').textContent = cats.length;

document.querySelectorAll('.lvtab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.lvtab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    lvFilter = t.dataset.lv;
    buildSidebar(); buildMain();
  });
});

function filterG(items) {
  if (lvFilter === 'all') return items;
  return items.filter(g => String(g.level) === lvFilter);
}

function buildSidebar() {
  const aside = document.getElementById('sidebar');
  let html = '<div class="sidebar-section">Chủ đề</div>';
  cats.forEach(cat => {
    const count = filterG(G.filter(g => g.cat === cat)).length;
    if (!count && lvFilter !== 'all') return;
    const active = cat === currentCat;
    html += `<button class="cat-btn${active?' active':''}" data-cat="${cat}">
      <span>${catIconMap[cat]||'📌'}</span>
      <span style="flex:1">${cat.split('—')[0].trim()}</span>
      <span class="cnt">${count}</span>
    </button>`;
  });
  aside.innerHTML = html;
  aside.querySelectorAll('.cat-btn').forEach(b => b.addEventListener('click', () => {
    currentCat = b.dataset.cat; searchQ = '';
    document.getElementById('search').value = '';
    buildSidebar(); buildMain();
  }));
}

function hl(t) {
  if (!searchQ || !t) return t || '';
  return t.replace(new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<span class="search-match">$1</span>');
}

function lvBadge(l) {
  const cls = l===5?'lv5':l===6?'lv6':'lv-both';
  return `<span class="level-badge ${cls}">LV${l}</span>`;
}
function freqBadge(f) {
  if (!f) return '';
  const map = {hi:['freq-hi','Hay ra ★★★'],mid:['freq-mid','Trung bình ★★'],lo:['freq-lo','Ít gặp ★']};
  const [cls,txt] = map[f]||['freq-lo',''];
  return `<span class="freq-badge ${cls}">${txt}</span>`;
}

function renderCard(g) {
  const struct = g.structure ? `<div class="section">
    <div class="section-label">Cấu trúc</div>
    <div class="structure-box">${hl(g.structure)}</div>
    ${g.structureNote?`<div class="structure-note">→ ${hl(g.structureNote)}</div>`:''}
  </div>` : '';

  const conj = g.conj?.length ? `<div class="section">
    <div class="section-label">Bảng so sánh / Biến đổi</div>
    <table class="conj-table"><thead><tr><th>Dạng</th><th>Kết quả / Ví dụ</th><th>Ghi chú</th></tr></thead><tbody>
      ${g.conj.map(([a,b,c])=>`<tr><td>${hl(a)}</td><td class="kr-g">${hl(b)}</td><td style="font-size:11px;color:var(--text2)">${hl(c||'')}</td></tr>`).join('')}
    </tbody></table>
  </div>` : '';

  const usage = g.usage?.length ? `<div class="section">
    <div class="section-label">Cách dùng</div>
    <ul class="usage-list">${g.usage.map(u=>`<li>${hl(u)}</li>`).join('')}</ul>
  </div>` : '';

  const ex = g.examples?.length ? `<div class="section">
    <div class="section-label">Ví dụ</div>
    <div class="example-list">
      ${g.examples.map(e=>`<div class="example-item">
        <div class="example-kr">${e.kr}</div>
        ${e.rom?`<div class="example-rom">${hl(e.rom)}</div>`:''}
        <div class="example-vi">→ ${hl(e.vi)}</div>
      </div>`).join('')}
    </div>
  </div>` : '';

  const cmp = g.compare ? `<div class="section">
    <div class="section-label">So sánh / Phân biệt</div>
    <div class="compare-box">${hl(g.compare)}</div>
  </div>` : '';

  const note = g.notes ? `<div class="section"><div class="note-box"><span class="note-icon">💡</span><div class="note-content">${hl(g.notes)}</div></div></div>` : '';

  const tip = g.topikTip ? `<div class="section"><div class="topik-tip"><span class="tip-icon">📝</span><span>${hl(g.topikTip)}</span></div></div>` : '';

  const tags = g.tags ? `<div class="tags">${g.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : '';

  return `<div class="grammar-card" id="c-${g.id}">
    <div class="card-head" onclick="tog('${g.id}')">
      <div class="pattern-tag" title="${g.pattern}">${g.pattern}</div>
      <div class="card-meta">
        <div class="card-meaning">${hl(g.meaning)}</div>
        <div class="card-level">${lvBadge(g.level)} ${freqBadge(g.freq)}</div>
      </div>
      <div class="chevron">▼</div>
    </div>
    <div class="card-body">${struct}${conj}${usage}${ex}${cmp}${note}${tip}${tags}</div>
  </div>`;
}

function buildMain() {
  const main = document.getElementById('main');
  if (searchQ.length >= 2) {
    const q = searchQ.toLowerCase();
    let items = filterG(G.filter(g =>
      g.pattern.toLowerCase().includes(q) ||
      g.meaning.toLowerCase().includes(q) ||
      (g.usage||[]).some(u=>u.toLowerCase().includes(q)) ||
      (g.notes||'').toLowerCase().includes(q) ||
      (g.compare||'').toLowerCase().includes(q) ||
      (g.examples||[]).some(e=>e.vi.toLowerCase().includes(q)||e.kr.toLowerCase().includes(q)) ||
      (g.topikTip||'').toLowerCase().includes(q)
    ));
    main.innerHTML = `<div class="cat-header"><div class="cat-title">🔍 Kết quả</div><span class="cat-count">${items.length} ngữ pháp</span></div>
      ${items.length?items.map(renderCard).join(''):'<div class="empty"><div style="font-size:48px">🔍</div><h3 style="color:var(--text2);margin-top:12px">Không tìm thấy</h3></div>'}`;
    return;
  }
  const items = filterG(G.filter(g=>g.cat===currentCat));
  main.innerHTML = `<div class="cat-header">
    <div class="cat-title">${catIconMap[currentCat]||'📌'} ${currentCat}</div>
    <span class="cat-count">${items.length} ngữ pháp</span>
  </div>
  ${items.length?items.map(renderCard).join(''):'<div class="empty"><div style="font-size:48px">📭</div><h3 style="color:var(--text2);margin-top:12px">Không có ngữ pháp ở cấp này</h3></div>'}`;
}

function tog(id) {
  document.getElementById('c-'+id)?.classList.toggle('open');
}

let st;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(st);
  st = setTimeout(() => { searchQ = e.target.value.trim(); buildSidebar(); buildMain(); }, 250);
});

buildSidebar();
buildMain();
</script>
</body>
</html>
