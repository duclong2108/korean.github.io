<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ vựng Tiếng Hàn – Xã hội & Chính trị (Nâng cao)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3f3f8;
    --card: #fff;
    --accent: #2a2a7a;
    --text: #0a0a28;
    --sub: #6a6a9a;
    --border: #d0d0e8;
    --tag-society: #e0e8fa;
    --tag-law: #fce8e8;
    --tag-politics: #fef0d8;
    --tag-people: #e8f8e8;
    --tag-crime: #f8e8f8;
    --highlight: #eeeeff;
    --row-alt: #f8f8fd;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Be Vietnam Pro',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .header { background:var(--text); color:#f3f3f8; padding:36px 40px 28px; position:relative; overflow:hidden; }
  .header::before { content:'사회'; position:absolute; right:40px; top:50%; transform:translateY(-50%); font-family:'Noto Serif KR',serif; font-size:120px; color:rgba(255,255,255,.05); font-weight:600; letter-spacing:-4px; user-select:none; }
  .header h1 { font-family:'Noto Serif KR',serif; font-size:28px; font-weight:600; letter-spacing:1px; margin-bottom:6px; }
  .header p { font-size:13px; font-weight:300; color:#9a9aba; letter-spacing:.5px; }
  .count-badge { display:inline-block; background:var(--accent); color:#fff; font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; margin-top:10px; letter-spacing:.5px; }
  .controls { padding:20px 40px; background:var(--card); border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:center; flex-wrap:wrap; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .search-wrap { position:relative; flex:1; min-width:200px; }
  .search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--sub); }
  #searchInput { width:100%; padding:10px 12px 10px 38px; border:1.5px solid var(--border); border-radius:8px; font-family:'Be Vietnam Pro',sans-serif; font-size:14px; background:var(--bg); color:var(--text); outline:none; transition:border-color .2s; }
  #searchInput:focus { border-color:var(--accent); }
  #searchInput::placeholder { color:var(--sub); }
  .filter-btn { padding:7px 12px; border:1.5px solid var(--border); border-radius:8px; background:var(--bg); font-family:'Be Vietnam Pro',sans-serif; font-size:11px; font-weight:500; color:var(--sub); cursor:pointer; transition:all .2s; white-space:nowrap; }
  .filter-btn:hover,.filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .result-count { font-size:12px; color:var(--sub); white-space:nowrap; }
  .table-wrap { padding:24px 40px 60px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  thead { background:var(--text); color:#f3f3f8; }
  th { padding:14px 16px; text-align:left; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
  th:nth-child(1),td:nth-child(1) { width:60px; text-align:center; }
  th:nth-child(2),td:nth-child(2) { width:145px; }
  th:nth-child(3),td:nth-child(3) { width:185px; }
  th:nth-child(4),td:nth-child(4) { width:210px; }
  th:nth-child(5),td:nth-child(5) { width:120px; }
  th:nth-child(6),td:nth-child(6) { min-width:280px; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
  tbody tr:nth-child(even) { background:var(--row-alt); }
  tbody tr:hover { background:var(--highlight); }
  td { padding:12px 16px; font-size:13.5px; vertical-align:middle; line-height:1.5; }
  td:nth-child(1) { font-size:11px; color:var(--sub); font-weight:600; }
  .korean-word { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:600; color:var(--accent); display:block; line-height:1.3; }
  .tag { display:inline-flex; align-items:center; border-radius:4px; padding:2px 8px; font-size:11px; font-weight:500; white-space:nowrap; }
  .tag-society  { background:var(--tag-society);  color:#0a0a60; }
  .tag-law      { background:var(--tag-law);      color:#7a0a0a; }
  .tag-politics { background:var(--tag-politics);  color:#5a3000; }
  .tag-people   { background:var(--tag-people);   color:#0a4a20; }
  .tag-crime    { background:var(--tag-crime);    color:#5a0a5a; }
  .note { font-size:12px; color:var(--sub); font-style:italic; }
  .no-results { text-align:center; padding:60px; color:var(--sub); font-size:15px; display:none; }
  .footer { text-align:center; padding:20px; font-size:11px; color:var(--sub); border-top:1px solid var(--border); }
  @media(max-width:768px){.header{padding:24px 20px}.header::before{display:none}.controls{padding:16px 20px}.table-wrap{padding:16px 20px 40px}th,td{padding:10px 12px}.korean-word{font-size:15px}}
</style>
</head>
<body>
<div class="header">
  <h1>사회 & 정치 (심화) — Xã hội & Chính trị (Nâng cao)</h1>
  <p>Từ vựng Tiếng Hàn chủ đề Xã hội nâng cao · Chủ đề TOPIK II</p>
  <span class="count-badge" id="totalCount"></span>
</div>
<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Tìm kiếm: tiếng Hàn, tiếng Anh, tiếng Việt...">
  </div>
  <button class="filter-btn active" data-filter="all">Tất cả</button>
  <button class="filter-btn" data-filter="society">Xã hội</button>
  <button class="filter-btn" data-filter="politics">Chính trị/Nhà nước</button>
  <button class="filter-btn" data-filter="law">Pháp luật</button>
  <button class="filter-btn" data-filter="crime">Tội phạm</button>
  <button class="filter-btn" data-filter="people">Con người/Nhóm người</button>
  <span class="result-count" id="resultCount"></span>
</div>
<div class="table-wrap">
  <table id="vocabTable">
    <thead><tr><th>#</th><th>Tiếng Hàn</th><th>Tiếng Anh</th><th>Tiếng Việt</th><th>Phân loại</th><th>Ghi chú &amp; Cách dùng</th></tr></thead>
    <tbody id="vocabBody"></tbody>
  </table>
  <div class="no-results" id="noResults">😕 Không tìm thấy từ nào phù hợp.</div>
</div>
<div class="footer">Tổng hợp từ vựng tiếng Hàn – Chủ đề Xã hội &amp; Chính trị (Nâng cao)</div>
<script>
const vocab=[
  {kr:"가난",en:"poverty",vi:"nghèo khó, sự nghèo đói",type:"society",note:"가난(家難). 가난하다=nghèo. 가난을 극복하다(vượt qua nghèo khó). 빈곤과 유사. ↔ 부유(giàu có)."},
  {kr:"개방",en:"opening, opening to the public",vi:"mở cửa, khai thông",type:"politics",note:"개방(開放). 개방하다=mở cửa. 시장 개방(mở cửa thị trường). 개방 정책(chính sách mở cửa). ↔ 폐쇄."},
  {kr:"경고",en:"warning, caution",vi:"cảnh báo",type:"law",note:"경고(警告). 경고하다=cảnh báo. 경고문(thông báo cảnh báo). 경고를 무시하다(bỏ qua cảnh báo)."},
  {kr:"계층",en:"class, stratum, hierarchy",vi:"tầng lớp, cấp bậc",type:"society",note:"계층(階層). 사회 계층(tầng lớp xã hội). 중산층(tầng lớp trung lưu). 계층 간 갈등(xung đột giữa các tầng lớp)."},
  {kr:"고아원",en:"orphanage",vi:"trại trẻ mồ côi",type:"society",note:"고아(孤兒,trẻ mồ côi)+원(院). 고아원에서 자라다(lớn lên ở trại mồ côi). 고아원을 운영하다."},
  {kr:"공동",en:"joint, shared, communal",vi:"chung, cộng đồng",type:"society",note:"공동(共同). 공동 작업(công việc chung). 공동체(cộng đồng). 공동 책임(trách nhiệm chung)."},
  {kr:"공동생활",en:"community life, living together",vi:"cuộc sống cộng đồng",type:"society",note:"공동(chung)+생활(生活). 공동생활을 하다(sống chung). 기숙사 공동생활(cuộc sống KTX chung)."},
  {kr:"공통점",en:"common point, similarity",vi:"điểm chung",type:"society",note:"공통(共通)+점(點). 공통점을 찾다(tìm điểm chung). 공통점이 있다/없다. ↔ 차이점(điểm khác biệt)."},
  {kr:"교포",en:"overseas Korean, diaspora",vi:"kiều bào",type:"people",note:"교포(僑胞). 재미 교포(kiều bào ở Mỹ). 교포 2세(thế hệ thứ 2 kiều bào). 재외 동포와 유사."},
  {kr:"구조대",en:"rescue team",vi:"đội cứu hộ",type:"society",note:"구조(救助)+대(隊). 구조대를 보내다(cử đội cứu hộ). 소방 구조대(đội cứu hộ cứu hỏa). 119 구조대."},
  {kr:"국가",en:"nation, state, country",vi:"quốc gia, đất nước",type:"politics",note:"국가(國家). 국가를 운영하다(vận hành quốc gia). 국가 안보(an ninh quốc gia). 선진 국가(quốc gia phát triển)."},
  {kr:"국민",en:"citizen, national, people",vi:"công dân, nhân dân",type:"politics",note:"국민(國民). 국민의 의무(nghĩa vụ công dân). 국민 투표(trưng cầu dân ý). 국민을 대표하다(đại diện nhân dân)."},
  {kr:"국외",en:"overseas, abroad",vi:"ở nước ngoài",type:"society",note:"국외(國外). 국외에 나가다(ra nước ngoài). 국외 거주자(người sinh sống ở nước ngoài). ↔ 국내."},
  {kr:"군대",en:"military, army",vi:"quân đội",type:"politics",note:"군대(軍隊). 군대에 가다(đi nghĩa vụ quân sự). 군대를 제대하다(xuất ngũ). 한국 남성 의무 복무."},
  {kr:"그룹",en:"group",vi:"nhóm",type:"society",note:"group에서. 그룹을 이루다(hình thành nhóm). 소그룹(nhóm nhỏ). 연구 그룹(nhóm nghiên cứu)."},
  {kr:"금지",en:"prohibition, ban",vi:"cấm, lệnh cấm",type:"law",note:"금지(禁止). 금지하다=cấm. 출입 금지(cấm ra vào). 흡연 금지(cấm hút thuốc). 금지 구역(khu vực cấm)."},
  {kr:"기부",en:"donation, contribution",vi:"quyên góp, từ thiện",type:"society",note:"기부(寄附). 기부하다=quyên góp. 기부금(tiền quyên góp). 자선 기부(từ thiện). 기부 문화(văn hóa từ thiện)."},
  {kr:"남녀노소",en:"people of all ages and genders",vi:"nam phụ lão ấu, mọi lứa tuổi",type:"people",note:"남(男)+녀(女)+노(老)+소(少). 남녀노소 누구나(tất cả mọi người không phân biệt). 모든 세대를 포함."},
  {kr:"남녀평등",en:"gender equality",vi:"bình đẳng giới",type:"society",note:"남녀(男女)+평등(平等). 남녀평등을 실현하다(thực hiện bình đẳng giới). 성평등과 유사."},
  {kr:"남부",en:"southern part, the south",vi:"phía nam, miền nam",type:"society",note:"남부(南部). 한국 남부(miền nam Hàn Quốc). 남부 지방(vùng phía nam). ↔ 북부(miền bắc)."},
  {kr:"남성",en:"male, man",vi:"nam giới",type:"people",note:"남성(男性). 남성 직원(nhân viên nam). 남성 화장품(mỹ phẩm nam). ↔ 여성(nữ giới). 남성성(nam tính)."},
  {kr:"노약자",en:"elderly and weak persons",vi:"người già và người tàn tật",type:"people",note:"노(老,già)+약자(弱者,người yếu). 노약자석(ghế dành cho người già và yếu thế). 노약자 우선."},
  {kr:"노인",en:"elderly person, senior",vi:"người cao tuổi, người già",type:"people",note:"노인(老人). 노인 복지(phúc lợi người cao tuổi). 노인 인구(dân số cao tuổi). 고령화 사회."},
  {kr:"노처녀",en:"unmarried older woman",vi:"gái già chưa lấy chồng",type:"people",note:"노(老,già)+처녀(cô gái). 결혼 적령기를 넘긴 미혼 여성. 구어체, 주의해서 사용. ↔ 노총각."},
  {kr:"노총각",en:"unmarried older man",vi:"trai già chưa lấy vợ",type:"people",note:"노(老)+총각(trai chưa vợ). 결혼 안 한 중년 남성. 노처녀와 쌍. 구어체, 주의해서 사용."},
  {kr:"농민",en:"farmer, peasant",vi:"nông dân",type:"people",note:"농민(農民). 농민 운동(phong trào nông dân). 농민 생활(cuộc sống nông dân). 농부와 유사하나 더 집단적."},
  {kr:"농부",en:"farmer",vi:"người nông dân",type:"people",note:"농부(農夫). 농부가 밭을 갈다(người nông dân cày ruộng). 농민과 유사하나 개인적 뉘앙스."},
  {kr:"단속",en:"crackdown, regulation",vi:"kiểm soát, trấn áp",type:"law",note:"단속(團束). 단속하다=trấn áp. 불법 단속(trấn áp bất hợp pháp). 교통 단속(kiểm soát giao thông)."},

  {kr:"대도시",en:"large city, metropolis",vi:"đô thị lớn, đại đô thị",type:"society",note:"대(大)+도시(都市). 대도시에 살다(sống ở đô thị lớn). 서울, 부산이 대표적 대도시. ↔ 농촌(nông thôn)."},
  {kr:"대중",en:"the public, the masses",vi:"đại chúng, công chúng",type:"society",note:"대중(大衆). 대중 매체(phương tiện đại chúng). 대중문화(văn hóa đại chúng). 대중의 지지(sự ủng hộ của công chúng)."},
  {kr:"대책",en:"countermeasure, policy response",vi:"biện pháp đối phó",type:"politics",note:"대책(對策). 대책을 마련하다(đưa ra biện pháp). 긴급 대책(biện pháp khẩn cấp). 대책 회의(họp đối phó)."},
  {kr:"대통령",en:"president (of a country)",vi:"tổng thống",type:"politics",note:"대통령(大統領). 대통령 선거(bầu cử tổng thống). 대통령이 되다(trở thành tổng thống). 현직 대통령(tổng thống đương nhiệm)."},
  {kr:"도난",en:"theft, robbery",vi:"trộm cắp, vụ trộm",type:"crime",note:"도난(盜難). 도난 사건(vụ trộm cắp). 도난을 당하다(bị mất trộm). 도난 방지(phòng chống trộm cắp)."},

  {kr:"독립",en:"independence",vi:"độc lập",type:"politics",note:"독립(獨立). 독립하다=độc lập. 독립운동(phong trào độc lập). 광복절(ngày giải phóng). 독립 국가(quốc gia độc lập)."},

  {kr:"출신",en:"origin, hometown, background",vi:"xuất thân, gốc gác",type:"society",note:"출신(出身). 출신이 어디예요?(gốc gác ở đâu?). 서울 출신(người gốc Seoul). 명문대 출신(xuất thân danh tiếng)."},
  {kr:"통일",en:"unification",vi:"thống nhất",type:"politics",note:"통일(統一). 남북 통일(thống nhất Nam-Bắc). 통일을 이루다(thực hiện thống nhất). 통일 운동(phong trào thống nhất)."},
  {kr:"투표",en:"vote, voting",vi:"bỏ phiếu, bầu cử",type:"politics",note:"투표(投票). 투표하다=bỏ phiếu. 투표율(tỷ lệ bỏ phiếu). 선거 투표(bầu cử). 투표권(quyền bầu cử)."},
  {kr:"평등",en:"equality",vi:"bình đẳng",type:"law",note:"평등(平等). 평등하다=bình đẳng. 기회 평등(bình đẳng cơ hội). 법 앞의 평등(bình đẳng trước pháp luật). ↔ 차별."},
  {kr:"평화",en:"peace",vi:"hòa bình",type:"politics",note:"평화(平和). 평화를 유지하다(duy trì hòa bình). 세계 평화(hòa bình thế giới). 평화 협정(hiệp định hòa bình)."},
  {kr:"폭발",en:"explosion, burst",vi:"vụ nổ, bùng phát",type:"crime",note:"폭발(爆發). 폭발이 일어나다(vụ nổ xảy ra). 폭발물(vật liệu nổ). 감정 폭발(bùng nổ cảm xúc—nghĩa bóng)."},
  {kr:"피해",en:"damage, harm, loss",vi:"thiệt hại, tổn hại",type:"society",note:"피해(被害). 피해를 입다(chịu thiệt hại). 피해를 주다(gây thiệt hại). 피해액(số tiền thiệt hại)."},
  {kr:"피해자",en:"victim",vi:"nạn nhân",type:"people",note:"피해(thiệt hại)+자(者). 범죄 피해자(nạn nhân tội phạm). 피해자 지원(hỗ trợ nạn nhân). 사고 피해자(nạn nhân tai nạn)."},
  {kr:"현대인",en:"modern person, people of today",vi:"người hiện đại",type:"people",note:"현대(現代)+인(人). 현대인의 스트레스(stress của người hiện đại). 현대인의 생활 방식(lối sống hiện đại)."},
  {kr:"혼잡",en:"congestion, crowding, chaos",vi:"hỗn loạn, tắc nghẽn",type:"society",note:"혼잡(混雜). 혼잡하다=hỗn loạn/đông đúc. 교통 혼잡(tắc nghẽn giao thông). 혼잡한 도시(đô thị đông đúc)."},
  {kr:"화재",en:"fire, blaze",vi:"hỏa hoạn, đám cháy",type:"crime",note:"화재(火災). 화재가 발생하다(xảy ra hỏa hoạn). 화재를 진압하다(dập tắt đám cháy). 화재 신고(báo cháy 119)."},
  {kr:"후보",en:"candidate",vi:"ứng cử viên, người ứng tuyển",type:"politics",note:"후보(候補). 대통령 후보(ứng cử viên tổng thống). 후보를 지지하다(ủng hộ ứng cử viên). 후보 등록(đăng ký ứng cử)."},
  {kr:"희생자",en:"victim, casualty, sacrifice",vi:"nạn nhân, người hy sinh",type:"people",note:"희생(犧牲)+자(者). 전쟁 희생자(nạn nhân chiến tranh). 사고 희생자(nạn nhân tai nạn). 피해자보다 더 비극적 뉘앙스."},
];
let currentFilter='all';
function renderTable(data){
  const tbody=document.getElementById('vocabBody');
  tbody.innerHTML='';
  data.forEach((item,i)=>{
    let t;
    if(item.type==='society')t=`<span class="tag tag-society">Xã hội</span>`;
    else if(item.type==='politics')t=`<span class="tag tag-politics">Chính trị</span>`;
    else if(item.type==='law')t=`<span class="tag tag-law">Pháp luật</span>`;
    else if(item.type==='crime')t=`<span class="tag tag-crime">Tội phạm</span>`;
    else t=`<span class="tag tag-people">Con người</span>`;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${i+1}</td><td><span class="korean-word">${item.kr}</span></td><td>${item.en}</td><td>${item.vi}</td><td>${t}</td><td><span class="note">${item.note}</span></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('resultCount').textContent=`${data.length} / ${vocab.length} từ`;
}
function filterAndSearch(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const result=vocab.filter(item=>{
    const mf=currentFilter==='all'||item.type===currentFilter;
    const ms=!q||item.kr.includes(q)||item.en.toLowerCase().includes(q)||item.vi.toLowerCase().includes(q)||item.note.toLowerCase().includes(q);
    return mf&&ms;
  });
  renderTable(result);
  document.getElementById('noResults').style.display=result.length===0?'block':'none';
  document.getElementById('vocabTable').style.display=result.length===0?'none':'';
}
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    filterAndSearch();
  });
});
document.getElementById('searchInput').addEventListener('input',filterAndSearch);
document.getElementById('totalCount').textContent=vocab.length+' từ';
renderTable(vocab);
</script>
</body>
</html>
