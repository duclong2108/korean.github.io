<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 퀴즈 — Giải trí & Thể thao</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #17171e;
    --card: #1e1e28;
    --border: #2e2e3e;
    --accent: #c8a96e;
    --accent2: #7c9ef5;
    --correct: #4caf82;
    --wrong: #e05c5c;
    --text: #e8e4dc;
    --muted: #7a7890;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  .wrap { width: 100%; max-width: 640px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 40px; }
  header .label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 700; line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stats {
    display: flex; gap: 8px; margin-bottom: 28px; justify-content: center;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--muted);
    flex: 1; text-align: center;
  }
  .stat span { display: block; font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .stat.s-correct span { color: var(--correct); }
  .stat.s-wrong span { color: var(--wrong); }
  .progress-track {
    height: 3px; background: var(--border); border-radius: 99px;
    margin-bottom: 36px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
  }
  .card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  .mode-badge {
    position: absolute; top: 16px; right: 20px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted);
  }
  .question-num {
    font-size: 11px; color: var(--muted); margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .question-word {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(32px, 9vw, 52px);
    font-weight: 700; line-height: 1.1;
    margin-bottom: 10px;
    color: var(--text);
  }
  .question-prompt {
    font-size: 13px; color: var(--muted); margin-bottom: 28px;
  }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    line-height: 1.4;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--accent2);
    background: #1e1e30;
    transform: translateY(-1px);
  }
  .opt.correct {
    border-color: var(--correct);
    background: rgba(76,175,130,0.12);
    color: var(--correct);
  }
  .opt.wrong {
    border-color: var(--wrong);
    background: rgba(224,92,92,0.1);
    color: var(--wrong);
  }
  .opt:disabled { cursor: default; }
  .opt-letter {
    display: inline-block; width: 20px; height: 20px;
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 10px; line-height: 20px; text-align: center;
    margin-right: 8px; color: var(--muted);
    transition: all 0.18s;
  }
  .opt.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .feedback {
    margin-top: 18px; padding: 12px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    display: none; align-items: center; gap: 8px;
  }
  .feedback.show { display: flex; }
  .feedback.ok { background: rgba(76,175,130,0.12); color: var(--correct); border: 1px solid rgba(76,175,130,0.25); }
  .feedback.err { background: rgba(224,92,92,0.1); color: var(--wrong); border: 1px solid rgba(224,92,92,0.2); }
  .btn-next {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 12px;
    color: #0e0e12; font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; display: none;
    transition: opacity 0.2s, transform 0.2s;
    margin-top: 8px;
  }
  .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-next.show { display: block; }
  .modes {
    display: flex; gap: 8px; margin-bottom: 24px; justify-content: center;
  }
  .mode-btn {
    padding: 7px 16px; border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: 12px; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif;
    transition: all 0.18s;
  }
  .mode-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(200,169,110,0.08);
  }
  .result-screen {
    display: none; text-align: center; padding: 48px 24px;
  }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 56px; margin-bottom: 16px; }
  .result-score {
    font-family: 'Noto Serif KR', serif;
    font-size: 56px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .result-msg { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .btn-restart {
    padding: 14px 36px; border-radius: 12px;
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Be Vietnam Pro', sans-serif;
    transition: all 0.2s;
  }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }
  @keyframes pop { 0%{transform:scale(0.96);opacity:0} 100%{transform:scale(1);opacity:1} }
  .card { animation: pop 0.3s ease; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="label">TOPIK Vocabulary</div>
    <h1>Giải trí & Thể thao</h1>
  </header>

  <div class="modes">
    <button class="mode-btn active" onclick="setMode('ko-vi')">한국어 → Tiếng Việt</button>
    <button class="mode-btn" onclick="setMode('vi-ko')">Tiếng Việt → 한국어</button>
  </div>

  <div class="stats">
    <div class="stat"><span id="st-total">0</span>Đã làm</div>
    <div class="stat s-correct"><span id="st-correct">0</span>Đúng</div>
    <div class="stat s-wrong"><span id="st-wrong">0</span>Sai</div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="quiz-area">
    <div class="card" id="card">
      <span class="mode-badge" id="mode-badge">KO → VI</span>
      <div class="question-num" id="q-num">Câu 1 / 104</div>
      <div class="question-word" id="q-word">—</div>
      <div class="question-prompt" id="q-prompt">Chọn nghĩa đúng bằng tiếng Việt</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <div class="result-screen" id="result">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-score" id="res-score">0/104</div>
    <div class="result-msg" id="res-msg"></div>
    <button class="btn-restart" onclick="restart()">Làm lại</button>
  </div>
</div>

<script>
const RAW = `감독==director/đạo diễn, huấn luyện viên
감상==appreciation/thưởng thức, cảm thụ
개막식==opening ceremony/lễ khai mạc
개최==hosting (an event)/tổ chức sự kiện
결말==end (of a story)/kết thúc câu chuyện
결승전==final game/round/trận chung kết
공연장==performance hall/sân khấu biểu diễn
관객==audience/khán giả
관람==viewing/xem, thưởng lãm
관람객==audience/khán giả, người xem
그네==swing/cái đu, xích đu
금메달==gold medal/huy chương vàng
기록==record/kỷ lục, ghi chép
꼴찌==the last place/người/vị trí cuối
나들이==picnic/đi chơi, dạo chơi ngoài trời
낙서==doodle/vẽ linh tinh, vẽ bậy
놀이==play, game/trò chơi, vui chơi
달리기==running/chạy bộ, môn chạy
댄스==dance/khiêu vũ, nhảy múa
동호회==club/câu lạc bộ sở thích
뒤풀이==after-party/tiệc sau sự kiện, hậu trường
레포츠==leisure sports/thể thao giải trí
로또==lottery/xổ số lotto
리듬==rhythm/nhịp điệu
마라톤==marathon/chạy marathon
마술==magic/ảo thuật
멜로디==melody/giai điệu
무대==(performance) stage/sân khấu
뮤지컬==musical/nhạc kịch, musical
바느질==needlework/may vá, khâu vá
바둑==game of go/cờ vây
발레==ballet/múa ba-lê
방청객==audience/khán giả tại chỗ
복권==lottery/xổ số
볼거리==highlights/fun things to see/điều thú vị để xem
볼링==bowling/bowling
볼링장==bowling gym/sân bowling
불꽃놀이==firework/pháo hoa
사진첩==photo album/album ảnh
사회자==moderator, chairperson/người dẫn chương trình
상==prize, reward/giải thưởng, phần thưởng
상금==prize money, reward/tiền thưởng
소극장==small theater/nhà hát nhỏ
쇼==show/chương trình biểu diễn
수집==collection/sưu tập, thu thập
술자리==drinking party/bữa nhậu, tiệc rượu
승리==victory/chiến thắng
시합==competition, match/trận đấu, cuộc thi
씨름==Sireum, Korean Sumo/vật Hàn Quốc (Ssireum)
앨범==album/album ảnh/nhạc
야경==night view/cảnh đêm, phong cảnh đêm
야유회==picnic/dã ngoại công ty
여가==leisure/thời gian rảnh, giải trí
연극==theater/kịch, vở kịch
연기==delay, postponement, smoke, acting/trì hoãn; khói; diễn xuất
연속극==serial drama, soap opera/phim truyền hình dài kỳ
연주==performance/biểu diễn nhạc cụ
연주회==concert/buổi hòa nhạc
영화감독==film director/đạo diễn phim
영화제==film festival/liên hoan phim
예술==art/nghệ thuật
오락==entertainment/giải trí, trò vui
오페라==opera/opera, nhạc kịch
올림픽==olympic/Olympic
요가==yoga/yoga
우승==victory, championship/chiến thắng, giành chức vô địch
음악회==musical concert/buổi hòa nhạc
응원==cheering, support/cổ vũ, ủng hộ
일등==first place/hạng nhất, đứng đầu
입장권==admission ticket/vé vào cửa
입장료==admission fee/phí vào cổng
작곡==composition/sáng tác âm nhạc
작사==writing lyrics/viết lời bài hát
작품==work, piece/tác phẩm
장난감==toy/đồ chơi
재즈==jazz/nhạc jazz
전반전==first half/hiệp một (thể thao)
전시==exhibition/triển lãm
전시회==exhibition/buổi triển lãm
조깅==jogging/chạy bộ nhẹ
주인공==main character/nhân vật chính
지휘자==conductor/người chỉ huy, nhạc trưởng
진행자==chairperson/người dẫn chương trình
참가==participation/sự tham gia
체육관==gym/phòng thể dục, nhà thi đấu
체조==gymnastics/thể dục dụng cụ
체험==experience/trải nghiệm
촬영장==studio/phim trường, nơi quay phim
촬영지==filming site/địa điểm quay phim
추첨==drawing lots/bốc thăm, rút thăm
캠프==camping/trại hè, cắm trại
코미디==comedy/hài kịch, phim hài
코미디언==comedian/diễn viên hài
콘서트==concert/buổi hòa nhạc, concert
퀴즈==quiz/câu đố, quiz
클래식==classic/cổ điển, nhạc cổ điển
텐트==tent/lều cắm trại
팬==fan/fan, người hâm mộ
풍선==balloon/bóng bay
피서==summer vacation/nghỉ mát mùa hè
피아니스트==pianist/nghệ sĩ piano
해수욕==sea bathing/tắm biển
행사장==event hall/địa điểm tổ chức sự kiện
헬스클럽==sports club, gym/câu lạc bộ thể dục
회식==group dinner, drinking party/ăn uống tập thể công ty
후반전==second half/hiệp hai thể thao
휴양지==resort/khu nghỉ dưỡng`;

const vocab = RAW.trim().split('\n').map(line => {
  const [ko, rest] = line.split('==');
  const [en, vi] = rest.split('/');
  return { ko: ko.trim(), en: en.trim(), vi: vi.trim() };
});

let TOTAL = vocab.length;
let mode = 'ko-vi';
let queue = [];
let current = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'ko-vi') || (i === 1 && m === 'vi-ko'));
  });
  document.getElementById('mode-badge').textContent = m === 'ko-vi' ? 'KO → VI' : 'VI → KO';
  restart();
}

function restart() {
  TOTAL = vocab.length;
  queue = shuffle(vocab);
  current = 0; correctCount = 0; wrongCount = 0;
  updateStats();
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  renderQuestion();
}

function updateStats() {
  document.getElementById('st-total').textContent = current;
  document.getElementById('st-correct').textContent = correctCount;
  document.getElementById('st-wrong').textContent = wrongCount;
  document.getElementById('prog').style.width = (current / TOTAL * 100) + '%';
}

function renderQuestion() {
  answered = false;
  const item = queue[current];
  document.getElementById('q-num').textContent = `Câu ${current + 1} / ${TOTAL}`;

  const isKoVi = mode === 'ko-vi';
  document.getElementById('q-word').textContent = isKoVi ? item.ko : item.vi;
  document.getElementById('q-prompt').textContent = isKoVi ? 'Chọn nghĩa đúng bằng tiếng Việt' : 'Chọn từ tiếng Hàn đúng';

  const pool = vocab.filter(v => v.ko !== item.ko);
  const wrongs = shuffle(pool).slice(0, 3);
  const opts = shuffle([item, ...wrongs]);

  const letters = ['A', 'B', 'C', 'D'];
  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  opts.forEach((opt, i) => {
    const label = isKoVi ? opt.vi : opt.ko;
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${label}`;
    btn.onclick = () => handleAnswer(btn, opt.ko === item.ko);
    optEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
}

function handleAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.opt');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    fb.className = 'feedback show ok';
    fb.innerHTML = '✓ Chính xác!';
  } else {
    btn.classList.add('wrong');
    wrongCount++;
    const item = queue[current];
    allBtns.forEach(b => {
      const label = b.textContent.slice(1).trim();
      const isKoVi = mode === 'ko-vi';
      if ((isKoVi && label === item.vi) || (!isKoVi && label === item.ko)) {
        b.classList.add('correct');
      }
    });
    fb.className = 'feedback show err';
    const answer = mode === 'ko-vi' ? queue[current].vi : queue[current].ko;
    fb.innerHTML = `✗ Đáp án đúng: <strong>${answer}</strong>`;
  }

  current++;
  updateStats();
  document.getElementById('btn-next').className = 'btn-next show';

  if (current >= TOTAL) {
    document.getElementById('btn-next').textContent = 'Xem kết quả →';
  }
}

function nextQuestion() {
  if (current >= TOTAL) {
    showResult();
    return;
  }
  renderQuestion();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result').classList.add('show');
  const pct = Math.round(correctCount / TOTAL * 100);
  document.getElementById('res-score').textContent = `${correctCount}/${TOTAL}`;
  const emojis = ['😅','😐','🙂','😊','🎉'];
  document.getElementById('res-emoji').textContent = emojis[Math.floor(pct/25)];
  const msgs = [
    'Cần ôn thêm nhiều nhé!',
    'Không tệ, cố lên!',
    'Khá ổn đó! Luyện thêm chút nữa.',
    'Tốt lắm! Gần thuộc rồi!',
    '완벽해요! Giỏi lắm!'
  ];
  document.getElementById('res-msg').textContent = msgs[Math.floor(pct/25)] + ` (${pct}%)`;
}

restart();
</script>
</body>
</html>
