<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 퀴즈 — Thiên nhiên</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #17171e;
    --card: #1e1e28;
    --border: #2e2e3e;
    --accent: #c8a96e;
    --accent2: #7c9ef5;
    --correct: #4caf82;
    --wrong: #e05c5c;
    --text: #e8e4dc;
    --muted: #7a7890;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .wrap { width: 100%; max-width: 640px; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 40px; }
  header .label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 700; line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* Stats bar */
  .stats {
    display: flex; gap: 8px; margin-bottom: 28px; justify-content: center;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--muted);
    flex: 1; text-align: center;
  }
  .stat span { display: block; font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .stat.s-correct span { color: var(--correct); }
  .stat.s-wrong span { color: var(--wrong); }

  /* Progress */
  .progress-track {
    height: 3px; background: var(--border); border-radius: 99px;
    margin-bottom: 36px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
  }
  .card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  .mode-badge {
    position: absolute; top: 16px; right: 20px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted);
  }
  .question-num {
    font-size: 11px; color: var(--muted); margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .question-word {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(36px, 10vw, 56px);
    font-weight: 700; line-height: 1;
    margin-bottom: 10px;
    color: var(--text);
  }
  .question-prompt {
    font-size: 13px; color: var(--muted); margin-bottom: 28px;
  }

  /* Options */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    line-height: 1.4;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--accent2);
    background: #1e1e30;
    transform: translateY(-1px);
  }
  .opt.correct {
    border-color: var(--correct);
    background: rgba(76,175,130,0.12);
    color: var(--correct);
  }
  .opt.wrong {
    border-color: var(--wrong);
    background: rgba(224,92,92,0.1);
    color: var(--wrong);
  }
  .opt:disabled { cursor: default; }
  .opt-letter {
    display: inline-block; width: 20px; height: 20px;
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 10px; line-height: 20px; text-align: center;
    margin-right: 8px; color: var(--muted);
    transition: all 0.18s;
  }
  .opt.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

  /* Feedback */
  .feedback {
    margin-top: 18px; padding: 12px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    display: none; align-items: center; gap: 8px;
  }
  .feedback.show { display: flex; }
  .feedback.ok { background: rgba(76,175,130,0.12); color: var(--correct); border: 1px solid rgba(76,175,130,0.25); }
  .feedback.err { background: rgba(224,92,92,0.1); color: var(--wrong); border: 1px solid rgba(224,92,92,0.2); }

  /* Next button */
  .btn-next {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 12px;
    color: #0e0e12; font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; display: none;
    transition: opacity 0.2s, transform 0.2s;
    margin-top: 8px;
  }
  .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-next.show { display: block; }

  /* Mode selector */
  .modes {
    display: flex; gap: 8px; margin-bottom: 24px; justify-content: center;
  }
  .mode-btn {
    padding: 7px 16px; border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: 12px; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif;
    transition: all 0.18s;
  }
  .mode-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(200,169,110,0.08);
  }

  /* Result screen */
  .result-screen {
    display: none; text-align: center; padding: 48px 24px;
  }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 56px; margin-bottom: 16px; }
  .result-score {
    font-family: 'Noto Serif KR', serif;
    font-size: 56px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .result-msg { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .btn-restart {
    padding: 14px 36px; border-radius: 12px;
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Be Vietnam Pro', sans-serif;
    transition: all 0.2s;
  }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }

  @keyframes pop { 0%{transform:scale(0.96);opacity:0} 100%{transform:scale(1);opacity:1} }
  .card { animation: pop 0.3s ease; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="label">TOPIK Vocabulary</div>
    <h1>Thiên nhiên & Môi trường</h1>
  </header>

  <div class="modes">
    <button class="mode-btn active" onclick="setMode('ko-vi')">한국어 → Tiếng Việt</button>
    <button class="mode-btn" onclick="setMode('vi-ko')">Tiếng Việt → 한국어</button>
  </div>

  <div class="stats">
    <div class="stat"><span id="st-total">0</span>Đã làm</div>
    <div class="stat s-correct"><span id="st-correct">0</span>Đúng</div>
    <div class="stat s-wrong"><span id="st-wrong">0</span>Sai</div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="quiz-area">
    <div class="card" id="card">
      <span class="mode-badge" id="mode-badge">KO → VI</span>
      <div class="question-num" id="q-num">Câu 1 / 20</div>
      <div class="question-word" id="q-word">—</div>
      <div class="question-prompt" id="q-prompt">Chọn nghĩa đúng bằng tiếng Việt</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <div class="result-screen" id="result">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-score" id="res-score">0/20</div>
    <div class="result-msg" id="res-msg"></div>
    <button class="btn-restart" onclick="restart()">Làm lại</button>
  </div>
</div>

<script>
const RAW = `가뭄==drought/hạn hán
가스==gas/khí gas
가축==livestock/gia súc
강물==river water/nước sông
강변==riverside/bờ sông
강수량==rain precipitation/lượng mưa
강우량==(the amount of) rainfall/lượng mưa
개구리==frog/con ếch
거미==spider/con nhện
거북이==turtle/con rùa
거품==bubble/bọt, bong bóng
건조==dry/khô, sự sấy khô
고래==whale/con cá voi
곰==bear/con gấu
공해==pollution/ô nhiễm môi trường
국화==chrysanthemum/hoa cúc
그늘==shade/bóng mát, bóng râm
기후==climate/khí hậu
껍질==peel, skin/vỏ (quả, hạt)
꼬리==tail/đuôi (con vật)
꼭대기==summit, top/đỉnh, chóp
꿀벌==honey bee/con ong mật
나뭇잎==leaf/lá cây
낙엽==fallen leaves/lá rụng
날개==wings/đôi cánh
냇가==stream, lake/ven suối, mé sông
농사==agriculture/nông nghiệp, làm ruộng
농약==pesticides/thuốc trừ sâu
농작물==crops/nông sản, hoa màu
농촌==rural/nông thôn, vùng nông nghiệp
눈보라==snowstorm/bão tuyết
눈사태==avalanche/tuyết lở
다람쥐==squirrel/con sóc
단풍==autumn leaves, maple/lá phong, lá đỏ mùa thu
더위==heat, hotness/cái nóng, nhiệt độ nóng
돌==stone, rock/đá, hòn đá
동굴==cave/hang động
동해안==east coast/bờ biển phía đông
땅==land, ground/đất, mặt đất
마을==village/làng, thôn
매연==soot/khói bụi, bụi than
먹이==(animal) feed/thức ăn cho thú
먼지==dust/bụi, bụi bẩn
모기==mosquito/con muỗi
모래==sand/cát
무더위==extreme heat (in summer)/nắng nóng cực độ
무지개==rainbow/cầu vồng
물고기==fish/con cá
물방울==water drop/giọt nước
물질==quality/vật chất, chất liệu
바닷물==seawater/nước biển
바위==rock, stone/tảng đá, mỏm đá
밭==(farm) field/ruộng, nương
뱀==snake/con rắn
벌집==honeycomb/tổ ong
벼==rice plant/cây lúa
벼락==thunder/sấm sét
보름달==full moon/trăng rằm
분리수거==garbage recycling/phân loại rác
불빛==flame, light/ánh đèn, ánh lửa
비바람==rain and wind, typhoon/gió mưa, bão
빗길==rainy road/đường mưa trơn
빛==light/ánh sáng
뿌리==root/rễ cây, gốc rễ
사막==desert/sa mạc
사슴==deer/con hươu
산꼭대기==mountain summit/đỉnh núi
산더미==pile/như núi, chất đống
산불==forest fire/cháy rừng
석유==oil, petroleum/dầu mỏ, dầu hỏa
석탄==coal/than đá
소나기==(sudden) shower/rain/mưa rào đột ngột
소음==noise/tiếng ồn
쇠==iron/sắt, kim loại
숲==forest/khu rừng
습기==moisture/độ ẩm
습도==humidity/độ ẩm không khí
식물==plant/thực vật, cây cỏ
안개==fog/sương mù
알==egg, ball/trứng; viên thuốc
애완견==pet dog/chó cảnh
애완동물==pets/thú cưng
야외==outdoors/ngoài trời, dã ngoại
에너지==energy/năng lượng
열대야==a very hot night/đêm nhiệt đới, đêm nóng
예보==forecast/dự báo thời tiết
오염==pollution/ô nhiễm
온도==temperature/nhiệt độ
온천==hot spring/suối nước nóng
우물==well/giếng nước
우주==space/vũ trụ
우주여행==space travel/du hành vũ trụ
원숭이==monkey/con khỉ
은==silver/bạc (kim loại)
일출==sunrise/bình minh, mặt trời mọc
잎==leaf/lá (cây)
자외선==ultraviolet rays/tia cực tím
자원==resource/nguồn tài nguyên; tình nguyện
잔디==grass/cỏ, thảm cỏ
잔디밭==grass field/bãi cỏ, sân cỏ
잠자리==dragonfly/chuồn chuồn
재해==disaster/thảm họa, thiên tai
재활용==recycling/tái chế, tái sử dụng
재활용품==recycled goods/đồ tái chế
제비==swallow/con én
쥐==mouse/con chuột
지구==earth/Trái Đất
지진==earthquake/động đất
짐승==beast/con thú, dã thú
찜통더위==humid heat/nóng ẩm khủng khiếp
첫눈==first snow/tuyết đầu tiên (đầu mùa)
추위==cold/cái lạnh, sự lạnh giá
친환경==being eco-friendly/thân thiện môi trường
카네이션==carnation/hoa cẩm chướng
코끼리==elephant/con voi
태양==sun/mặt trời
태양열==solar heat/năng lượng mặt trời
토끼==rabbit/con thỏ
폭설==heavy snow/tuyết dày, bão tuyết
폭우==heavy rain/mưa lớn, trận mưa
폭포==waterfall/thác nước
풍경==landscape/phong cảnh
플라스틱==plastic/nhựa
해돋이==sunrise/cảnh mặt trời mọc
해수욕장==beach/bãi biển tắm
햇곡식==new grain/hạt mới thu hoạch
햇볕==sunlight/ánh nắng mặt trời
향==scent/hương thơm, mùi
향기==fragrance/hương thơm
호수==lake/hồ nước
홍수==flood/lũ lụt
화분==flowerpot/chậu hoa
화산==volcano/núi lửa
환경==environment/môi trường
환절기==seasonal change/giao mùa
황사==yellow dust, asian dust/bụi vàng, cát bụi châu Á
휘발유==gasoline/xăng dầu
흙==soil/đất, đất cát`

const vocab = RAW.trim().split('\n').map(line => {
  const [ko, rest] = line.split('==');
  const [en, vi] = rest.split('/');
  return { ko: ko.trim(), en: en.trim(), vi: vi.trim() };
});

let TOTAL = vocab.length;
let mode = 'ko-vi';
let queue = [];
let current = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'ko-vi') || (i === 1 && m === 'vi-ko'));
  });
  document.getElementById('mode-badge').textContent = m === 'ko-vi' ? 'KO → VI' : 'VI → KO';
  restart();
}

function restart() {
  TOTAL = vocab.length;
  queue = shuffle(vocab);
  current = 0; correctCount = 0; wrongCount = 0;
  updateStats();
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  renderQuestion();
}

function updateStats() {
  document.getElementById('st-total').textContent = current;
  document.getElementById('st-correct').textContent = correctCount;
  document.getElementById('st-wrong').textContent = wrongCount;
  document.getElementById('prog').style.width = (current / TOTAL * 100) + '%';
}

function renderQuestion() {
  answered = false;
  const item = queue[current];
  document.getElementById('q-num').textContent = `Câu ${current + 1} / ${TOTAL}`;

  const isKoVi = mode === 'ko-vi';
  document.getElementById('q-word').textContent = isKoVi ? item.ko : item.vi;
  document.getElementById('q-prompt').textContent = isKoVi ? 'Chọn nghĩa đúng bằng tiếng Việt' : 'Chọn từ tiếng Hàn đúng';

  // Pick 3 wrong answers
  const pool = vocab.filter(v => v.ko !== item.ko);
  const wrongs = shuffle(pool).slice(0, 3);
  const opts = shuffle([item, ...wrongs]);

  const letters = ['A', 'B', 'C', 'D'];
  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  opts.forEach((opt, i) => {
    const label = isKoVi ? opt.vi : opt.ko;
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${label}`;
    btn.onclick = () => handleAnswer(btn, opt.ko === item.ko);
    optEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
}

function handleAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.opt');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    fb.className = 'feedback show ok';
    fb.innerHTML = '✓ Chính xác!';
  } else {
    btn.classList.add('wrong');
    wrongCount++;
    // Highlight correct
    const item = queue[current];
    allBtns.forEach(b => {
      const label = b.textContent.slice(1).trim();
      const isKoVi = mode === 'ko-vi';
      if ((isKoVi && label === item.vi) || (!isKoVi && label === item.ko)) {
        b.classList.add('correct');
      }
    });
    fb.className = 'feedback show err';
    const answer = mode === 'ko-vi' ? queue[current].vi : queue[current].ko;
    fb.innerHTML = `✗ Đáp án đúng: <strong>${answer}</strong>`;
  }

  current++;
  updateStats();
  document.getElementById('btn-next').className = 'btn-next show';

  if (current >= TOTAL) {
    document.getElementById('btn-next').textContent = 'Xem kết quả →';
  }
}

function nextQuestion() {
  if (current >= TOTAL) {
    showResult();
    return;
  }
  renderQuestion();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result').classList.add('show');
  const pct = Math.round(correctCount / TOTAL * 100);
  document.getElementById('res-score').textContent = `${correctCount}/${TOTAL}`;
  const emojis = ['😅','😐','🙂','😊','🎉'];
  document.getElementById('res-emoji').textContent = emojis[Math.floor(pct/25)];
  const msgs = [
    'Cần ôn thêm nhiều nhé!',
    'Không tệ, cố lên!',
    'Khá ổn đó! Luyện thêm chút nữa.',
    'Tốt lắm! Gần thuộc rồi!',
    '완벽해요! Giỏi lắm!'
  ];
  document.getElementById('res-msg').textContent = msgs[Math.floor(pct/25)] + ` (${pct}%)`;
}
