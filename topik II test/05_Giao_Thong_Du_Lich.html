<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 퀴즈 — Giao thông</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #17171e;
    --card: #1e1e28;
    --border: #2e2e3e;
    --accent: #c8a96e;
    --accent2: #7c9ef5;
    --correct: #4caf82;
    --wrong: #e05c5c;
    --text: #e8e4dc;
    --muted: #7a7890;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  .wrap { width: 100%; max-width: 640px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 40px; }
  header .label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 700; line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stats { display: flex; gap: 8px; margin-bottom: 28px; justify-content: center; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px; color: var(--muted);
    flex: 1; text-align: center;
  }
  .stat span { display: block; font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .stat.s-correct span { color: var(--correct); }
  .stat.s-wrong span { color: var(--wrong); }
  .progress-track { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 36px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 32px 32px;
    margin-bottom: 20px; position: relative; overflow: hidden;
  }
  .card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  .mode-badge {
    position: absolute; top: 16px; right: 20px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  }
  .question-num { font-size: 11px; color: var(--muted); margin-bottom: 16px; letter-spacing: 1px; }
  .question-word {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(36px, 10vw, 56px);
    font-weight: 700; line-height: 1; margin-bottom: 10px; color: var(--text);
  }
  .question-prompt { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    font-size: 14px; font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text); cursor: pointer; transition: all 0.18s;
    text-align: left; line-height: 1.4;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent2); background: #1e1e30; transform: translateY(-1px); }
  .opt.correct { border-color: var(--correct); background: rgba(76,175,130,0.12); color: var(--correct); }
  .opt.wrong { border-color: var(--wrong); background: rgba(224,92,92,0.1); color: var(--wrong); }
  .opt:disabled { cursor: default; }
  .opt-letter {
    display: inline-block; width: 20px; height: 20px;
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 10px; line-height: 20px; text-align: center;
    margin-right: 8px; color: var(--muted); transition: all 0.18s;
  }
  .opt.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .feedback {
    margin-top: 18px; padding: 12px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 600; display: none; align-items: center; gap: 8px;
  }
  .feedback.show { display: flex; }
  .feedback.ok { background: rgba(76,175,130,0.12); color: var(--correct); border: 1px solid rgba(76,175,130,0.25); }
  .feedback.err { background: rgba(224,92,92,0.1); color: var(--wrong); border: 1px solid rgba(224,92,92,0.2); }
  .btn-next {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 12px;
    color: #0e0e12; font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; display: none; transition: opacity 0.2s, transform 0.2s; margin-top: 8px;
  }
  .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-next.show { display: block; }
  .modes { display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; }
  .mode-btn {
    padding: 7px 16px; border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: 12px; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif; transition: all 0.18s;
  }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.08); }
  .result-screen { display: none; text-align: center; padding: 48px 24px; }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 56px; margin-bottom: 16px; }
  .result-score {
    font-family: 'Noto Serif KR', serif; font-size: 56px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
  .result-msg { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .btn-restart {
    padding: 14px 36px; border-radius: 12px;
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Be Vietnam Pro', sans-serif; transition: all 0.2s;
  }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }
  @keyframes pop { 0%{transform:scale(0.96);opacity:0} 100%{transform:scale(1);opacity:1} }
  .card { animation: pop 0.3s ease; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="label">TOPIK Vocabulary</div>
    <h1>Giao thông & Du lịch</h1>
  </header>

  <div class="modes">
    <button class="mode-btn active" onclick="setMode('ko-vi')">한국어 → Tiếng Việt</button>
    <button class="mode-btn" onclick="setMode('vi-ko')">Tiếng Việt → 한국어</button>
  </div>

  <div class="stats">
    <div class="stat"><span id="st-total">0</span>Đã làm</div>
    <div class="stat s-correct"><span id="st-correct">0</span>Đúng</div>
    <div class="stat s-wrong"><span id="st-wrong">0</span>Sai</div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="quiz-area">
    <div class="card" id="card">
      <span class="mode-badge" id="mode-badge">KO → VI</span>
      <div class="question-num" id="q-num">Câu 1 / 84</div>
      <div class="question-word" id="q-word">—</div>
      <div class="question-prompt" id="q-prompt">Chọn nghĩa đúng bằng tiếng Việt</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <div class="result-screen" id="result">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-score" id="res-score">0/84</div>
    <div class="result-msg" id="res-msg"></div>
    <button class="btn-restart" onclick="restart()">Làm lại</button>
  </div>
</div>

<script>
const RAW = `고속==high speed/tốc độ cao
고속도로==highway/đường cao tốc
골목길==alley/ngõ hẻm
과속==speed violation/chạy quá tốc độ
관광==tourism/du lịch, tham quan
관광객==tourist/khách du lịch
관광지==tourist attraction/điểm du lịch
교통수단==transportation/phương tiện giao thông
교통편==transportation/phương tiện vận chuyển
국내선==domestic flights/chuyến bay nội địa
국제선==international flights/chuyến bay quốc tế
귀국==return (to home country)/về nước
기념품==souvenir/quà lưu niệm
기차역==train station/ga tàu hỏa
기차표==train ticket/vé tàu hỏa
길가==roadside/bên đường, lề đường
노선==route, line/tuyến đường
대중교통==public transportation/giao thông công cộng
도중==on the way/giữa đường, trên đường
뒷자리==back seat/ghế phía sau
렌터카==car rental/xe thuê
막차==last train/chuyến tàu/xe cuối
매표소==ticket office/phòng bán vé
면세점==duty-free shop/cửa hàng miễn thuế
명소==famous place/danh lam thắng cảnh
목적지==destination/điểm đến, nơi đến
묵다==to stay (at a hotel)/nghỉ lại, ở trọ
민박==lodge, a local hotel/nhà nghỉ dân dã, homestay
바퀴==wheels/bánh xe
배낭==backpack/ba lô
배낭여행==backpack trip/du lịch ba lô
브레이크==brake/phanh, thắng xe
비자==visa/thị thực (visa)
셔틀버스==shuttle bus/xe buýt đưa đón
소방차==firetruck/xe cứu hỏa
속도위반==speed violation/vi phạm tốc độ
숙박==lodging, accomodating/chỗ ở, nơi nghỉ
숙박비==accommodation fee/phí thuê phòng
숙소==accommodation/nơi lưu trú
승객==passenger/hành khách
승용차==passenger car/xe ô tô con
승차==riding, boarding/lên xe, lên tàu
시외버스==intercity bus/xe buýt liên tỉnh
신호==signal/tín hiệu, đèn hiệu
안전선==safety line/đường an toàn
여관==hotel, inn/nhà trọ, khách sạn nhỏ
여행비==travel expenses/chi phí đi du lịch
여행자==traveler/du khách, người đi du lịch
여행지==travel destination/điểm du lịch
예매==reservation, booking/đặt vé trước
오토바이==motorcycle/xe máy, mô tô
왕복==round trip/khứ hồi
운전면허==driver's license/bằng lái xe
운전자==driver/người lái xe
유람선==cruise ship/tàu du lịch
이동==move/di chuyển, dịch chuyển
전동차==subway train/tàu điện ngầm (toa)
전철==subway, train/tàu điện, metro
정차==stopping/dừng xe, tạm dừng
좌석==seat/ghế ngồi, chỗ ngồi
좌회전==turn left/rẽ trái
주유소==gas station/trạm xăng
중고차==second-hand car/xe cũ
직진==going straight/đi thẳng
출국==leaving a country/xuất cảnh, rời khỏi đất nước
출근길==on the way to work/trên đường đi làm
출입국==immigration/xuất nhập cảnh
충돌==collision/va chạm, xung đột
카센터==car repair shop/gara ô tô
큰길==main road/đường lớn, đường chính
탑승구==boarding gate/cửa lên máy bay
퇴근길==way back from home/đường về sau giờ làm
트럭==truck/xe tải
티켓==ticket/vé
표지판==display board/biển báo
항공==flight/hàng không
항공권==flight ticket/vé máy bay
항공기==aircraft/máy bay tổng quát
항공료==airfare/giá vé máy bay
항공사==airlines/hãng hàng không
항공편==flight/chuyến bay
헬멧==helmet/mũ bảo hiểm
화물==cargo/hàng hóa, hàng chuyên chở`;

const vocab = RAW.trim().split('\n').map(line => {
  const [ko, rest] = line.split('==');
  const [en, vi] = rest.split('/');
  return { ko: ko.trim(), en: en.trim(), vi: vi.trim() };
});

let TOTAL = vocab.length;
let mode = 'ko-vi';
let queue = [];
let current = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'ko-vi') || (i === 1 && m === 'vi-ko'));
  });
  document.getElementById('mode-badge').textContent = m === 'ko-vi' ? 'KO → VI' : 'VI → KO';
  restart();
}

function restart() {
  TOTAL = vocab.length;
  queue = shuffle(vocab);
  current = 0; correctCount = 0; wrongCount = 0;
  updateStats();
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  renderQuestion();
}

function updateStats() {
  document.getElementById('st-total').textContent = current;
  document.getElementById('st-correct').textContent = correctCount;
  document.getElementById('st-wrong').textContent = wrongCount;
  document.getElementById('prog').style.width = (current / TOTAL * 100) + '%';
}

function renderQuestion() {
  answered = false;
  const item = queue[current];
  document.getElementById('q-num').textContent = `Câu ${current + 1} / ${TOTAL}`;
  const isKoVi = mode === 'ko-vi';
  document.getElementById('q-word').textContent = isKoVi ? item.ko : item.vi;
  document.getElementById('q-prompt').textContent = isKoVi ? 'Chọn nghĩa đúng bằng tiếng Việt' : 'Chọn từ tiếng Hàn đúng';

  const pool = vocab.filter(v => v.ko !== item.ko);
  const wrongs = shuffle(pool).slice(0, 3);
  const opts = shuffle([item, ...wrongs]);

  const letters = ['A', 'B', 'C', 'D'];
  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  opts.forEach((opt, i) => {
    const label = isKoVi ? opt.vi : opt.ko;
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${label}`;
    btn.onclick = () => handleAnswer(btn, opt.ko === item.ko);
    optEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
}

function handleAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.opt');
  allBtns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    fb.className = 'feedback show ok';
    fb.innerHTML = '✓ Chính xác!';
  } else {
    btn.classList.add('wrong');
    wrongCount++;
    const item = queue[current];
    allBtns.forEach(b => {
      const label = b.textContent.slice(1).trim();
      const isKoVi = mode === 'ko-vi';
      if ((isKoVi && label === item.vi) || (!isKoVi && label === item.ko)) {
        b.classList.add('correct');
      }
    });
    fb.className = 'feedback show err';
    const answer = mode === 'ko-vi' ? queue[current].vi : queue[current].ko;
    fb.innerHTML = `✗ Đáp án đúng: <strong>${answer}</strong>`;
  }
  current++;
  updateStats();
  document.getElementById('btn-next').className = 'btn-next show';
  if (current >= TOTAL) {
    document.getElementById('btn-next').textContent = 'Xem kết quả →';
  }
}

function nextQuestion() {
  if (current >= TOTAL) { showResult(); return; }
  renderQuestion();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result').classList.add('show');
  const pct = Math.round(correctCount / TOTAL * 100);
  document.getElementById('res-score').textContent = `${correctCount}/${TOTAL}`;
  const emojis = ['😅','😐','🙂','😊','🎉'];
  document.getElementById('res-emoji').textContent = emojis[Math.floor(pct/25)];
  const msgs = ['Cần ôn thêm nhiều nhé!','Không tệ, cố lên!','Khá ổn đó! Luyện thêm chút nữa.','Tốt lắm! Gần thuộc rồi!','완벽해요! Giỏi lắm!'];
  document.getElementById('res-msg').textContent = msgs[Math.floor(pct/25)] + ` (${pct}%)`;
}

restart();
</script>
</body>
</html>
