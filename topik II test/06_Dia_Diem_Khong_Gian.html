<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 퀴즈 — Nơi ở & Không gian</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #17171e;
    --card: #1e1e28;
    --border: #2e2e3e;
    --accent: #c8a96e;
    --accent2: #7c9ef5;
    --correct: #4caf82;
    --wrong: #e05c5c;
    --text: #e8e4dc;
    --muted: #7a7890;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  .wrap { width: 100%; max-width: 640px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 40px; }
  header .label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 700; line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stats { display: flex; gap: 8px; margin-bottom: 28px; justify-content: center; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px; color: var(--muted);
    flex: 1; text-align: center;
  }
  .stat span { display: block; font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .stat.s-correct span { color: var(--correct); }
  .stat.s-wrong span { color: var(--wrong); }
  .progress-track { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 36px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 32px 32px;
    margin-bottom: 20px; position: relative; overflow: hidden;
  }
  .card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  .mode-badge {
    position: absolute; top: 16px; right: 20px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  }
  .question-num { font-size: 11px; color: var(--muted); margin-bottom: 16px; letter-spacing: 1px; }
  .question-word {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(36px, 10vw, 56px);
    font-weight: 700; line-height: 1; margin-bottom: 10px; color: var(--text);
  }
  .question-prompt { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
    font-size: 14px; font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text); cursor: pointer; transition: all 0.18s;
    text-align: left; line-height: 1.4;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent2); background: #1e1e30; transform: translateY(-1px); }
  .opt.correct { border-color: var(--correct); background: rgba(76,175,130,0.12); color: var(--correct); }
  .opt.wrong { border-color: var(--wrong); background: rgba(224,92,92,0.1); color: var(--wrong); }
  .opt:disabled { cursor: default; }
  .opt-letter {
    display: inline-block; width: 20px; height: 20px;
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 10px; line-height: 20px; text-align: center;
    margin-right: 8px; color: var(--muted); transition: all 0.18s;
  }
  .opt.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .feedback {
    margin-top: 18px; padding: 12px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 600; display: none; align-items: center; gap: 8px;
  }
  .feedback.show { display: flex; }
  .feedback.ok { background: rgba(76,175,130,0.12); color: var(--correct); border: 1px solid rgba(76,175,130,0.25); }
  .feedback.err { background: rgba(224,92,92,0.1); color: var(--wrong); border: 1px solid rgba(224,92,92,0.2); }
  .btn-next {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 12px;
    color: #0e0e12; font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; display: none; transition: opacity 0.2s, transform 0.2s; margin-top: 8px;
  }
  .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-next.show { display: block; }
  .modes { display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; }
  .mode-btn {
    padding: 7px 16px; border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: 12px; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif; transition: all 0.18s;
  }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,110,0.08); }
  .result-screen { display: none; text-align: center; padding: 48px 24px; }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 56px; margin-bottom: 16px; }
  .result-score {
    font-family: 'Noto Serif KR', serif; font-size: 56px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;
  }
  .result-msg { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .btn-restart {
    padding: 14px 36px; border-radius: 12px;
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Be Vietnam Pro', sans-serif; transition: all 0.2s;
  }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }
  @keyframes pop { 0%{transform:scale(0.96);opacity:0} 100%{transform:scale(1);opacity:1} }
  .card { animation: pop 0.3s ease; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="label">TOPIK Vocabulary</div>
    <h1>Nơi ở & Không gian</h1>
  </header>

  <div class="modes">
    <button class="mode-btn active" onclick="setMode('ko-vi')">한국어 → Tiếng Việt</button>
    <button class="mode-btn" onclick="setMode('vi-ko')">Tiếng Việt → 한국어</button>
  </div>

  <div class="stats">
    <div class="stat"><span id="st-total">0</span>Đã làm</div>
    <div class="stat s-correct"><span id="st-correct">0</span>Đúng</div>
    <div class="stat s-wrong"><span id="st-wrong">0</span>Sai</div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="quiz-area">
    <div class="card" id="card">
      <span class="mode-badge" id="mode-badge">KO → VI</span>
      <div class="question-num" id="q-num">Câu 1 / 120</div>
      <div class="question-word" id="q-word">—</div>
      <div class="question-prompt" id="q-prompt">Chọn nghĩa đúng bằng tiếng Việt</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <div class="result-screen" id="result">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-score" id="res-score">0/120</div>
    <div class="result-msg" id="res-msg"></div>
    <button class="btn-restart" onclick="restart()">Làm lại</button>
  </div>
</div>

<script>
const RAW = `가구점==furniture store/cửa hàng đồ nội thất
가습기==humidifier/máy tạo ẩm
가전제품==home appliances/đồ gia dụng điện tử
간판==signboard/biển hiệu, bảng hiệu
객실==guest room/phòng khách, phòng khách sạn
걸레==rag/giẻ lau, cây lau
결혼식장==wedding hall/hội trường tiệc cưới
계산대==cashier/quầy thu ngân
고무줄==rubber band/dây chun
고층==upper floors/tầng cao, cao tầng
공공장소==public place/nơi công cộng
관리실==management room/phòng quản lý
광장==square, plaza/quảng trường
교외==suburbs/ngoại ô
기념관==memorial hall/nhà kỷ niệm, đài kỷ niệm
기둥==pillar/cột trụ
길거리==street/đường phố, vỉa hè
꽃병==flower vase/bình hoa
끈==string/sợi dây, dây thừng
난로==stove, fireplace/lò sưởi
난방==heater/hệ thống sưởi
내부==inside, internal/bên trong, nội bộ
놀이터==playground/sân chơi
담==wall, fence, hedge/tường, hàng rào
대문==door, gate/cổng chính, cửa lớn
대중목욕탕==public bath/nhà tắm công cộng
대청소==housecleaning/dọn dẹp lớn, vệ sinh toàn bộ
독방==room to oneself/phòng riêng
동물원==zoo/vườn thú
뒷문==back gate/cổng sau, cửa sau
등불==lights, lamp/đèn lồng, ánh đèn
램프==lamp/đèn, bóng đèn
로비==lobby/sảnh (khách sạn)
마당==garden/sân, vườn
마루==indoor floor/sàn nhà
마트==supermarket/siêu thị
막대기==rod, stick/gậy, cây gậy
매점==shop/quầy hàng, ki-ốt
목욕탕==public bath/nhà tắm công cộng
바가지==gourd/gáo dừa; chặt chém
바구니==basket/cái rổ, giỏ
바깥==outside, outdoor/bên ngoài, ngoài trời
바늘==needle/kim khâu
바닥==bottom, floor/sàn nhà; đáy
박스==box/hộp, thùng
반대쪽==opposite side/phía đối diện
베개==pillow/gối (cái gối)
벨==bell/chuông
벼룩시장==flea market/chợ đồ cũ
벽걸이==wall-hanging/đồ treo tường
벽돌==brick/gạch xây
변기==toilet bowl/bồn cầu
보관실==storage room/phòng lưu trữ
복도==corridor, hallway/hành lang
블라인드==blind/mành che, rèm blinds
비닐==vinyl/nylon, nhựa vinyl
사진관==photo studio/studio chụp ảnh
산책로==walking path/đường dạo bộ
상가==shopping street/khu mua sắm
상담실==counseling room/phòng tư vấn
상점==store/cửa hàng
서랍==drawer/ngăn kéo
세면대==washbasin, sink/bồn rửa mặt
세제==detergent/chất tẩy rửa
소방서==fire department/trạm cứu hỏa
손잡이==handle, rail/tay cầm, tay nắm
쇼핑몰==shopping mall/trung tâm mua sắm
쇼핑센터==shopping center/trung tâm thương mại
수도꼭지==water faucet/vòi nước
술집==bar/quán rượu, bar
승강기==elevator/thang máy
식물원==botanical garden/vườn thực vật
실내==indoor/trong nhà, nội thất
싱크대==sink/chậu rửa bát
쓰레기통==trash can/thùng rác
안내소==information office/quầy thông tin
안방==master's bedroom/phòng ngủ chính
안쪽==inside/bên trong, phía trong
액자==picture frame/khung ảnh
오피스텔==officetel/căn hộ văn phòng
욕실==bathroom/phòng tắm
원룸==studio apartment/phòng trọ studio
유리창==window glass/kính cửa sổ
음식점==restaurant/nhà hàng, quán ăn
이불==blanket/chăn, mền
이삿짐==belongings when moving house/đồ đạc khi chuyển nhà
장례식장==funeral hall/nhà tang lễ
장바구니==shopping basket/giỏ đi chợ
저금통==piggybank/heo đất, lợn tiết kiệm
전구==light bulb/bóng đèn
전등==lamp, light/đèn điện
전문점==specialty shop/cửa hàng chuyên dụng
전셋집==rent house/nhà thuê theo hệ thống Jeonse
전자레인지==microwave/lò vi sóng
제자리==original place/chỗ cũ, vị trí ban đầu
조명==lighting, illumination/chiếu sáng, ánh đèn
종이컵==paper cup/cốc giấy
주거==residence/nơi ở, chỗ cư trú
주방==kitchen/bếp, nhà bếp
주택==housing, residence/nhà ở, nhà dân
주택가==residential area/khu dân cư
지붕==roof/mái nhà
찻집==café, teahouse/quán trà
창==window/cửa sổ; giáo, thương
천장==ceiling/trần nhà
침실==bedroom/phòng ngủ
카펫==carpet/thảm trải sàn
커튼==curtain/rèm cửa
편의점==convenience store/cửa hàng tiện lợi
포장지==wrapping paper/giấy gói
할인점==discount store/cửa hàng giảm giá
현관==entrance/lối vào, cửa vào nhà
현관문==entrance door/cửa lối vào
화장지==toilet paper/giấy vệ sinh
환기==ventilation/thông gió, thông khí
회의장==conference hall/phòng họp, hội trường
후문==back gate/cổng sau
휴게실==break-out room, lounge/phòng nghỉ ngơi`;

const vocab = RAW.trim().split('\n').map(line => {
  const [ko, rest] = line.split('==');
  const [en, vi] = rest.split('/');
  return { ko: ko.trim(), en: en.trim(), vi: vi.trim() };
});

let TOTAL = vocab.length;
let mode = 'ko-vi';
let queue = [];
let current = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'ko-vi') || (i === 1 && m === 'vi-ko'));
  });
  document.getElementById('mode-badge').textContent = m === 'ko-vi' ? 'KO → VI' : 'VI → KO';
  restart();
}

function restart() {
  TOTAL = vocab.length;
  queue = shuffle(vocab);
  current = 0; correctCount = 0; wrongCount = 0;
  updateStats();
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  renderQuestion();
}

function updateStats() {
  document.getElementById('st-total').textContent = current;
  document.getElementById('st-correct').textContent = correctCount;
  document.getElementById('st-wrong').textContent = wrongCount;
  document.getElementById('prog').style.width = (current / TOTAL * 100) + '%';
}

function renderQuestion() {
  answered = false;
  const item = queue[current];
  document.getElementById('q-num').textContent = `Câu ${current + 1} / ${TOTAL}`;
  const isKoVi = mode === 'ko-vi';
  document.getElementById('q-word').textContent = isKoVi ? item.ko : item.vi;
  document.getElementById('q-prompt').textContent = isKoVi ? 'Chọn nghĩa đúng bằng tiếng Việt' : 'Chọn từ tiếng Hàn đúng';

  const pool = vocab.filter(v => v.ko !== item.ko);
  const wrongs = shuffle(pool).slice(0, 3);
  const opts = shuffle([item, ...wrongs]);

  const letters = ['A', 'B', 'C', 'D'];
  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  opts.forEach((opt, i) => {
    const label = isKoVi ? opt.vi : opt.ko;
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${label}`;
    btn.onclick = () => handleAnswer(btn, opt.ko === item.ko);
    optEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
}

function handleAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;
  const allBtns = document.querySelectorAll('.opt');
  allBtns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    fb.className = 'feedback show ok';
    fb.innerHTML = '✓ Chính xác!';
  } else {
    btn.classList.add('wrong');
    wrongCount++;
    const item = queue[current];
    allBtns.forEach(b => {
      const label = b.textContent.slice(1).trim();
      const isKoVi = mode === 'ko-vi';
      if ((isKoVi && label === item.vi) || (!isKoVi && label === item.ko)) {
        b.classList.add('correct');
      }
    });
    fb.className = 'feedback show err';
    const answer = mode === 'ko-vi' ? queue[current].vi : queue[current].ko;
    fb.innerHTML = `✗ Đáp án đúng: <strong>${answer}</strong>`;
  }
  current++;
  updateStats();
  document.getElementById('btn-next').className = 'btn-next show';
  if (current >= TOTAL) {
    document.getElementById('btn-next').textContent = 'Xem kết quả →';
  }
}

function nextQuestion() {
  if (current >= TOTAL) { showResult(); return; }
  renderQuestion();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result').classList.add('show');
  const pct = Math.round(correctCount / TOTAL * 100);
  document.getElementById('res-score').textContent = `${correctCount}/${TOTAL}`;
  const emojis = ['😅','😐','🙂','😊','🎉'];
  document.getElementById('res-emoji').textContent = emojis[Math.floor(pct/25)];
  const msgs = ['Cần ôn thêm nhiều nhé!','Không tệ, cố lên!','Khá ổn đó! Luyện thêm chút nữa.','Tốt lắm! Gần thuộc rồi!','완벽해요! Giỏi lắm!'];
  document.getElementById('res-msg').textContent = msgs[Math.floor(pct/25)] + ` (${pct}%)`;
}

restart();
</script>
</body>
</html>
