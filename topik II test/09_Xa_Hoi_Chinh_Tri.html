<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 퀴즈 — Xã hội & Cộng đồng</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Be+Vietnam+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #17171e;
    --card: #1e1e28;
    --border: #2e2e3e;
    --accent: #c8a96e;
    --accent2: #7c9ef5;
    --correct: #4caf82;
    --wrong: #e05c5c;
    --text: #e8e4dc;
    --muted: #7a7890;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  .wrap { width: 100%; max-width: 640px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 40px; }
  header .label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 700; line-height: 1.1;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stats {
    display: flex; gap: 8px; margin-bottom: 28px; justify-content: center;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--muted);
    flex: 1; text-align: center;
  }
  .stat span { display: block; font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .stat.s-correct span { color: var(--correct); }
  .stat.s-wrong span { color: var(--wrong); }
  .progress-track {
    height: 3px; background: var(--border); border-radius: 99px;
    margin-bottom: 36px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
  }
  .card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  .mode-badge {
    position: absolute; top: 16px; right: 20px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted);
  }
  .question-num {
    font-size: 11px; color: var(--muted); margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .question-word {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(32px, 9vw, 52px);
    font-weight: 700; line-height: 1.1;
    margin-bottom: 10px;
    color: var(--text);
  }
  .question-prompt {
    font-size: 13px; color: var(--muted); margin-bottom: 28px;
  }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    line-height: 1.4;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--accent2);
    background: #1e1e30;
    transform: translateY(-1px);
  }
  .opt.correct {
    border-color: var(--correct);
    background: rgba(76,175,130,0.12);
    color: var(--correct);
  }
  .opt.wrong {
    border-color: var(--wrong);
    background: rgba(224,92,92,0.1);
    color: var(--wrong);
  }
  .opt:disabled { cursor: default; }
  .opt-letter {
    display: inline-block; width: 20px; height: 20px;
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 10px; line-height: 20px; text-align: center;
    margin-right: 8px; color: var(--muted);
    transition: all 0.18s;
  }
  .opt.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .feedback {
    margin-top: 18px; padding: 12px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 600;
    display: none; align-items: center; gap: 8px;
  }
  .feedback.show { display: flex; }
  .feedback.ok { background: rgba(76,175,130,0.12); color: var(--correct); border: 1px solid rgba(76,175,130,0.25); }
  .feedback.err { background: rgba(224,92,92,0.1); color: var(--wrong); border: 1px solid rgba(224,92,92,0.2); }
  .btn-next {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 12px;
    color: #0e0e12; font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; display: none;
    transition: opacity 0.2s, transform 0.2s;
    margin-top: 8px;
  }
  .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-next.show { display: block; }
  .modes {
    display: flex; gap: 8px; margin-bottom: 24px; justify-content: center;
  }
  .mode-btn {
    padding: 7px 16px; border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: 12px; cursor: pointer;
    font-family: 'Be Vietnam Pro', sans-serif;
    transition: all 0.18s;
  }
  .mode-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(200,169,110,0.08);
  }
  .result-screen {
    display: none; text-align: center; padding: 48px 24px;
  }
  .result-screen.show { display: block; }
  .result-emoji { font-size: 56px; margin-bottom: 16px; }
  .result-score {
    font-family: 'Noto Serif KR', serif;
    font-size: 56px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .result-msg { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .btn-restart {
    padding: 14px 36px; border-radius: 12px;
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: 'Be Vietnam Pro', sans-serif;
    transition: all 0.2s;
  }
  .btn-restart:hover { border-color: var(--accent); color: var(--accent); }
  @keyframes pop { 0%{transform:scale(0.96);opacity:0} 100%{transform:scale(1);opacity:1} }
  .card { animation: pop 0.3s ease; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="label">TOPIK Vocabulary</div>
    <h1>Xã hội & Cộng đồng</h1>
  </header>

  <div class="modes">
    <button class="mode-btn active" onclick="setMode('ko-vi')">한국어 → Tiếng Việt</button>
    <button class="mode-btn" onclick="setMode('vi-ko')">Tiếng Việt → 한국어</button>
  </div>

  <div class="stats">
    <div class="stat"><span id="st-total">0</span>Đã làm</div>
    <div class="stat s-correct"><span id="st-correct">0</span>Đúng</div>
    <div class="stat s-wrong"><span id="st-wrong">0</span>Sai</div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="quiz-area">
    <div class="card" id="card">
      <span class="mode-badge" id="mode-badge">KO → VI</span>
      <div class="question-num" id="q-num">Câu 1 / 130</div>
      <div class="question-word" id="q-word">—</div>
      <div class="question-prompt" id="q-prompt">Chọn nghĩa đúng bằng tiếng Việt</div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <div class="result-screen" id="result">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-score" id="res-score">0/130</div>
    <div class="result-msg" id="res-msg"></div>
    <button class="btn-restart" onclick="restart()">Làm lại</button>
  </div>
</div>

<script>
const RAW = `가난==poverty/nghèo khó, sự nghèo đói
개방==opening, opening to the public/mở cửa, khai thông
경고==warning/cảnh báo
계층==hierarchy/tầng lớp, cấp bậc
고아원==orphanage/trại trẻ mồ côi
공동==joint/chung, cộng đồng
공동생활==community life/cuộc sống cộng đồng
공통점==common point/điểm chung
교포==overseas resident/kiều bào
구조대==rescue team/đội cứu hộ
국가==nation/quốc gia, đất nước
국민==citizens/công dân, nhân dân
국외==overseas resident/ở nước ngoài
군대==army/quân đội
그룹==group/nhóm
금지==ban/cấm, lệnh cấm
기부==donation/quyên góp, từ thiện
남녀노소==men and women of all ages/nam phụ lão ấu, mọi lứa tuổi
남녀평등==gender equality/bình đẳng giới
남부==southern/phía nam, miền nam
남성==male/nam giới
노약자==elderly and physically handicapped/người già và người tàn tật
노인==elderly/người cao tuổi, người già
노처녀==an unmarried and old woman/gái già chưa lấy chồng
노총각==unmarried and old man/trai già chưa lấy vợ
농민==farmer/nông dân
농부==farmer/người nông dân
단속==control, regulate (illegal action)/kiểm soát, trấn áp
단체==group/nhóm, tập thể
대도시==big city/đô thị lớn, đại đô thị
대중==public/đại chúng, công chúng
대책==countermeasures/biện pháp đối phó
대통령==president (of a country)/tổng thống
도난==theft/trộm cắp, vụ trộm
도둑==thief/kẻ trộm
독립==independence/độc lập
동부==eastern part/miền đông
마약==drug/ma túy, thuốc phiện
민족==ethnic group/dân tộc, tộc người
반대==opposite/đối lập, phản đối
벌금==fine/tiền phạt
범인==criminal, offender/kẻ phạm tội, tội phạm
범죄==crime/tội phạm, tội ác
법==law/pháp luật, luật pháp
법원==court of law/tòa án
보호==protection/sự bảo vệ
봉사==volunteer/tình nguyện, phục vụ
봉사자==volunteer person/người tình nguyện
분리==separation/sự tách biệt
불법==illegal/bất hợp pháp
사건==incident/sự kiện, vụ việc
사망자==the dead, casualty, victim/người chết, nạn nhân
사생활==privacy/đời tư, cuộc sống riêng
사회==society/xã hội
사회생활==social life/cuộc sống xã hội
살인==murder/giết người, tội giết người
상대==opponent/đối phương, đối tác
상대방==opponent/đối phương
상대편==the other person/bên kia, phe đối lập
새치기==cutting line/chen hàng, chen ngang
생활수준==quality of living/mức sống
서부==western/phía tây, miền tây
선진국==developed country/nước phát triển
성명==statement, signature/tuyên bố; họ tên
성별==gender/giới tính
성인==adult/người lớn, người trưởng thành
세대==generation/thế hệ
세상==world/thế giới, cuộc đời
소년==young boy/thiếu niên, cậu bé
소매치기==pickpocketing/móc túi, trộm cắp
소문==rumors, reputation/tin đồn
수상==prime minister/thủ tướng
신고==report/báo cáo, tố cáo
신도시==new city/đô thị mới
신세대==new generation/thế hệ mới
실종==disappearance, missing/mất tích
실종자==missing person/người mất tích
아동==child/trẻ em, nhi đồng
양로원==nursing home/nhà dưỡng lão
여성==female/phụ nữ, nữ giới
외교관==diplomat/nhà ngoại giao
위반==violation/vi phạm
의무==obligation/nghĩa vụ, bổn phận
의식주==clothing, food, and housing/ăn mặc ở (3 nhu cầu cơ bản)
이민==immigrants/di dân, nhập cư
인간==human/con người, loài người
인류==human race/nhân loại
일반인==ordinary people/người bình thường
장애==disability/khuyết tật, trở ngại
장애인==disabled people/người khuyết tật
전국==nationwide/cả nước, toàn quốc
전쟁==war/chiến tranh
젊은이==young people/người trẻ, giới trẻ
정부==government/chính phủ
정의==justice/công lý, chính nghĩa
정치==politics/chính trị
정치가==politician/chính khách
정치인==politician/chính trị gia
제도==system/chế độ, hệ thống
주민==resident/cư dân, người dân
중부==central part/miền trung
중심지==capital, hub/trung tâm, điểm trọng yếu
중앙==central part/trung tâm, trung ương
지역==area/khu vực, vùng
지위==status/địa vị, chức vị
질서==order/trật tự
참여==participation/sự tham gia
청년==youth/thanh niên
청소년==teenager/thiếu niên, tuổi teen
총==gun/súng
출산율==birth rate/tỷ lệ sinh
출신==origin, affiliation/xuất thân, gốc gác
통일==unification/thống nhất
투표==vote/bỏ phiếu, bầu cử
평등==equal/bình đẳng
평화==peace/hòa bình
폭발==explosion/vụ nổ, bùng phát
피해==damage/thiệt hại, tổn hại
피해자==victim/nạn nhân
현대인==modern people/người hiện đại
혼잡==confusion, mess, disorder/hỗn loạn, tắc nghẽn
화재==fire/hỏa hoạn, đám cháy
후보==candidate/ứng cử viên, người ứng tuyển
희생자==victim/nạn nhân, người hy sinh`;

const vocab = RAW.trim().split('\n').map(line => {
  const [ko, rest] = line.split('==');
  const [en, vi] = rest.split('/');
  return { ko: ko.trim(), en: en.trim(), vi: vi.trim() };
});

let TOTAL = vocab.length;
let mode = 'ko-vi';
let queue = [];
let current = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'ko-vi') || (i === 1 && m === 'vi-ko'));
  });
  document.getElementById('mode-badge').textContent = m === 'ko-vi' ? 'KO → VI' : 'VI → KO';
  restart();
}

function restart() {
  TOTAL = vocab.length;
  queue = shuffle(vocab);
  current = 0; correctCount = 0; wrongCount = 0;
  updateStats();
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz-area').style.display = '';
  renderQuestion();
}

function updateStats() {
  document.getElementById('st-total').textContent = current;
  document.getElementById('st-correct').textContent = correctCount;
  document.getElementById('st-wrong').textContent = wrongCount;
  document.getElementById('prog').style.width = (current / TOTAL * 100) + '%';
}

function renderQuestion() {
  answered = false;
  const item = queue[current];
  document.getElementById('q-num').textContent = `Câu ${current + 1} / ${TOTAL}`;

  const isKoVi = mode === 'ko-vi';
  document.getElementById('q-word').textContent = isKoVi ? item.ko : item.vi;
  document.getElementById('q-prompt').textContent = isKoVi ? 'Chọn nghĩa đúng bằng tiếng Việt' : 'Chọn từ tiếng Hàn đúng';

  const pool = vocab.filter(v => v.ko !== item.ko);
  const wrongs = shuffle(pool).slice(0, 3);
  const opts = shuffle([item, ...wrongs]);

  const letters = ['A', 'B', 'C', 'D'];
  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  opts.forEach((opt, i) => {
    const label = isKoVi ? opt.vi : opt.ko;
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${label}`;
    btn.onclick = () => handleAnswer(btn, opt.ko === item.ko);
    optEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';
}

function handleAnswer(btn, isCorrect) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.opt');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    fb.className = 'feedback show ok';
    fb.innerHTML = '✓ Chính xác!';
  } else {
    btn.classList.add('wrong');
    wrongCount++;
    const item = queue[current];
    allBtns.forEach(b => {
      const label = b.textContent.slice(1).trim();
      const isKoVi = mode === 'ko-vi';
      if ((isKoVi && label === item.vi) || (!isKoVi && label === item.ko)) {
        b.classList.add('correct');
      }
    });
    fb.className = 'feedback show err';
    const answer = mode === 'ko-vi' ? queue[current].vi : queue[current].ko;
    fb.innerHTML = `✗ Đáp án đúng: <strong>${answer}</strong>`;
  }

  current++;
  updateStats();
  document.getElementById('btn-next').className = 'btn-next show';

  if (current >= TOTAL) {
    document.getElementById('btn-next').textContent = 'Xem kết quả →';
  }
}

function nextQuestion() {
  if (current >= TOTAL) {
    showResult();
    return;
  }
  renderQuestion();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result').classList.add('show');
  const pct = Math.round(correctCount / TOTAL * 100);
  document.getElementById('res-score').textContent = `${correctCount}/${TOTAL}`;
  const emojis = ['😅','😐','🙂','😊','🎉'];
  document.getElementById('res-emoji').textContent = emojis[Math.floor(pct/25)];
  const msgs = [
    'Cần ôn thêm nhiều nhé!',
    'Không tệ, cố lên!',
    'Khá ổn đó! Luyện thêm chút nữa.',
    'Tốt lắm! Gần thuộc rồi!',
    '완벽해요! Giỏi lắm!'
  ];
  document.getElementById('res-msg').textContent = msgs[Math.floor(pct/25)] + ` (${pct}%)`;
}

restart();
</script>
</body>
</html>
